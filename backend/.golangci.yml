# Enterprise rationale: Automated code quality gate ensures consistent style
# and catches common bugs across team members. Without this, code quality
# relies solely on manual review which is error-prone and inconsistent.

version: "2"

run:
  timeout: 5m
  go: '1.26'

linters:
  enable:
    - errcheck       # Check for unchecked errors (Go classic)
    - govet          # Report suspicious constructs
    - staticcheck    # Advanced Go static analysis
    - revive         # Drop-in replacement for golint
    - gosec          # Security issues (G101-G404)
    - ineffassign    # Detect ineffectual assignments
    - unused         # Find unused code
    - misspell       # Find misspelled words
    - gocritic       # Go critic checker
    - bodyclose      # Check HTTP response body is closed
    - gocyclo        # 圈复杂度检测（max 15）
    - funlen         # 函数行数检测（max 50 行）
    - gocognit       # 认知复杂度检测（max 20）
    - goconst        # 重复字符串/数字提取为常量
    - dupl           # 重复代码块检测（threshold 150）

  exclusions:
    rules:
      # Test files may have longer functions and unchecked errors
      - path: '(.+)_test\.go'
        linters:
          - errcheck
          - gocritic
          - funlen
          - gocognit
          - dupl
          - gocyclo
          - bodyclose
          - goconst
          - gosec
          - revive
          - staticcheck
      # Generated protocol files
      - path: protocol/encode\.go
        linters:
          - gocritic
      # Bounded protocol conversions; lengths validated before cast
      - path: internal/(game|protocol)/
        linters:
          - gosec
        text: "G115"
      - path: internal/game/cooldown_contract_test\.go
        linters:
          - gosec
        text: "G304"
      - path: internal/testutil/
        linters:
          - gosec
        text: "G304"
      - path: internal/server/routes_test\.go
        linters:
          - gosec
        text: "G306"
      # Intentional API names (stutter) kept for clarity at call sites
      - linters:
          - revive
        text: "stutters"
      - linters:
          - revive
        text: "context-as-argument"
      - linters:
          - revive
        text: "var-naming"
      - linters:
          - revive
        text: "unexported-return"

formatters:
  enable:
    - gofmt          # 强制标准格式化
    - goimports      # 强制 standard import 排序

linters-settings:
  gosec:
    excludes:
      - G104 # Audit errors not checked (handled by errcheck)
  revive:
    rules:
      - name: exported
        arguments:
          - "checkPrivateReceivers"
  gocritic:
    enabled-tags:
      - diagnostic
      - style
  gocyclo:
    min-complexity: 15
  funlen:
    lines: 50
    statements: 40
  gocognit:
    min-complexity: 20
  goconst:
    min-len: 3
    min-occurrences: 3
  dupl:
    threshold: 150
