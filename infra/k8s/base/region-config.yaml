# Default region routing config for single-region / local deploy.
# Multi-region overlays replace these values via configMapGenerator (ADR-016).
apiVersion: v1
kind: ConfigMap
metadata:
  name: balloon-game-region
  labels:
    app: balloon-game
data:
  deploy-region: ""
  region-ws-endpoint: ""
  db-dialect: postgres
  # Comma-separated CIDRs of GKE Ingress / L7 LB proxies that may set X-Forwarded-*.
  # Overlays replace __TRUSTED_PROXY_CIDRS__ at deploy time (see ci-cd.yml).
  trusted-proxy-cidrs: ""
