# Ephemeral Redis for rate limiting & idempotency cache (ADR-029).
#
# 独立于 stateful Redis 实例：限流和幂等缓存可容忍数据丢失，
# fail-open 策略保证 Redis 不可用时服务继续运行。
# 不需要持久化 — 使用 maxmemory + allkeys-lru 自动淘汰。
#
# Phase 3 多区域：每区域部署一套，不跨区复制。
---
apiVersion: v1
kind: Service
metadata:
  name: redis-ephemeral
  labels:
    app: redis-ephemeral
spec:
  clusterIP: None
  selector:
    app: redis-ephemeral
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis-ephemeral
  labels:
    app: redis-ephemeral
spec:
  serviceName: redis-ephemeral
  replicas: 1
  selector:
    matchLabels:
      app: redis-ephemeral
  template:
    metadata:
      labels:
        app: redis-ephemeral
    spec:
      terminationGracePeriodSeconds: 10
      containers:
        - name: redis
          image: redis:7.4.0-alpine3.20@sha256:c35af3bbcef51a62c8bae5a9a563c6f1b60d7ebaea4cb5a3ccbcc157580ae098
          args: ["--maxmemory", "64mb", "--maxmemory-policy", "allkeys-lru", "--appendonly", "no"]
          ports:
            - containerPort: 6379
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 30
