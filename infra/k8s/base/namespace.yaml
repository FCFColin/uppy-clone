# Namespace for balloon-game stack (v2-R-79): PSS restricted 三档 (enforce/audit/warn) 强制安全合规。
# base 不设 namespace 字段，overlays 通过 `namespace: balloon-game` 归入此 namespace。
apiVersion: v1
kind: Namespace
metadata:
  name: balloon-game
  labels:
    app.kubernetes.io/part-of: balloon-game
    # Pod Security Standards (K8s ≥1.25) — restricted profile, 三档同时设置便于灰度。
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/enforce-version: latest
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/audit-version: latest
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/warn-version: latest
