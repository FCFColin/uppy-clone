# Region-local Redis for the room registry / state cache / rate limiting (ADR-014/029).
# 生产可替换为 Memorystore（GCP 托管 Redis）以获得 HA/备份；此处给出自托管最小形态。
#
# Ephemeral 模式（限流/幂等缓存，可容忍数据丢失）：将 maxmemory 改为 64mb、resources
# 降至 50m/64Mi → 200m/128Mi、移除 securityContext，并将 REDIS_EPHEMERAL_URL 指向此 Service。
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  labels:
    app: redis
spec:
  clusterIP: None
  selector:
    app: redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  labels:
    app: redis
spec:
  serviceName: redis
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      terminationGracePeriodSeconds: 30
      # infra-022: Pod 级 securityContext——Redis 镜像默认 UID 为 999（redis 用户）。
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        fsGroup: 999
      containers:
        - name: redis
          image: redis:7.4.0-alpine3.20@sha256:c35af3bbcef51a62c8bae5a9a563c6f1b60d7ebaea4cb5a3ccbcc157580ae098
          command:
            - sh
            - -c
            - |
              exec redis-server \
                --maxmemory 50% \
                --maxmemory-policy allkeys-lru \
                --appendonly no \
                --requirepass "${REDIS_PASSWORD}"
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: balloon-game-secrets
                  key: redis-password
          ports:
            - containerPort: 6379
          # infra-023: maxmemory 用百分比（50%）自动适配节点内存；allkeys-lru 保证淘汰最久未访问的 key。
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "320Mi"
          readinessProbe:
            exec:
              command: ["sh", "-c", "redis-cli -a $REDIS_PASSWORD ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["sh", "-c", "redis-cli -a $REDIS_PASSWORD ping"]
            initialDelaySeconds: 10
            periodSeconds: 30
