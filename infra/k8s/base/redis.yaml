# Region-local Redis for the room registry / state cache / rate limiting (ADR-014).
#
# 每区域一套 Redis：房间注册表与状态缓存是区域内热路径（owner 反向代理、租约），
# 必须低延迟且不跨区。跨区域只通过 CRDB GLOBAL room_directory 共享路由信息，
# Redis 不做跨区复制（避免跨洋写放大）。
#
# 注：生产可替换为 Memorystore（GCP 托管 Redis）以获得 HA/备份；此处给出自托管最小形态。
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  labels:
    app: redis
spec:
  clusterIP: None
  selector:
    app: redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  labels:
    app: redis
spec:
  serviceName: redis
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      terminationGracePeriodSeconds: 30
      # infra-022: Pod 级 securityContext——Redis 镜像默认 UID 为 999（redis 用户），
      # 显式声明 runAsNonRoot/runAsUser/fsGroup 锁定非 root，符合 PSG/PSS-restricted。
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        fsGroup: 999
      containers:
        - name: redis
          image: redis:7.4.0-alpine3.20@sha256:c35af3bbcef51a62c8bae5a9a563c6f1b60d7ebaea4cb5a3ccbcc157580ae098
          command:
            - sh
            - -c
            - |
              exec redis-server \
                --maxmemory 50% \
                --maxmemory-policy allkeys-lru \
                --appendonly no \
                --requirepass "${REDIS_PASSWORD}"
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: balloon-game-secrets
                  key: redis-password
          ports:
            - containerPort: 6379
          # infra-023: maxmemory 用百分比（50%）而非绝对值，自动适配节点内存大小；
          # allkeys-lru 保证内存压力下淘汰最久未访问的 key。
          # 注意：Redis 7+ 的百分比语义为"系统内存的 N%"，与 container limit 解耦。
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "320Mi"
          readinessProbe:
            exec:
              command: ["sh", "-c", "redis-cli -a $REDIS_PASSWORD ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["sh", "-c", "redis-cli -a $REDIS_PASSWORD ping"]
            initialDelaySeconds: 10
            periodSeconds: 30
