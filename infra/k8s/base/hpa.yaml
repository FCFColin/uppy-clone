# HPA for WebSocket/Game tier (ADR-005/016): 基于 CPU + ws_connections 自定义指标扩缩；scaleDown 稳定窗口 300s 避免 WS 长连接抖动式缩容。
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: balloon-game
  labels:
    app: balloon-game
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: StatefulSet
    name: balloon-game
  minReplicas: 3
  maxReplicas: 100
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
    - type: Pods
      pods:
        metric:
          name: ws_connections
        target:
          type: AverageValue
          # 每实例目标 ~800 连接（MaxWSConnections=1000 留 20% 余量; 审计 project-05-002: 原值 6000 矛盾已修）。
          averageValue: "800"
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
        - type: Pods
          value: 4
          periodSeconds: 30
      selectPolicy: Max
    scaleDown:
      # 长稳定窗口：WS 长连接缩容要谨慎，避免频繁触发优雅排空。
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
      selectPolicy: Min
