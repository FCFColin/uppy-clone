# WebSocket tier — GKE StatefulSet + headless Service (ADR-005/013/014/016):
# owner 反向代理需实例间可寻址，Cloud Run 不可达；StatefulSet 提供稳定网络身份，房间归属动态存 Redis 不依赖 PV。
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: balloon-game
  labels:
    app: balloon-game
  # 每区域 overlay 追加注解 iam.gke.io/gcp-service-account 实现 Workload Identity 绑定 (ADR-014)。
---
apiVersion: v1
kind: Service
metadata:
  name: balloon-game-internal
  labels:
    app: balloon-game
spec:
  # Headless: clusterIP=None → 每个 Pod 获得独立 DNS A 记录，实例间可直接拨号。
  clusterIP: None
  selector:
    app: balloon-game
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: balloon-game
  labels:
    app: balloon-game
spec:
  # 面向客户端的入口 Service（由 Ingress/LB 暴露）；非 owner 实例会把 WS 反向代理到 owner。
  type: ClusterIP
  selector:
    app: balloon-game
  ports:
    - name: http
      port: 80
      targetPort: 8080
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: balloon-game
  labels:
    app: balloon-game
spec:
  serviceName: balloon-game-internal
  replicas: 3
  selector:
    matchLabels:
      app: balloon-game
  template:
    metadata:
      labels:
        app: balloon-game
        # Scraped by Prometheus as the `region` label (deploy/prometheus/prometheus.yml).
        region: local
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      # Workload Identity (ADR-014): Pod 以 GCP IAM SA 身份访问 Cloud SQL/CRDB/Secret Manager，免长期密钥。
      serviceAccountName: balloon-game
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        fsGroup: 65532
        runAsGroup: 65532
        readOnlyRootFilesystem: true
      # 滚动更新期间优雅排空 WebSocket：给正在进行的对局留出收尾时间。
      terminationGracePeriodSeconds: 60
      # infra-020: topologySpreadConstraints 跨 zone 打散，避免单 zone 故障；maxSkew=1 容忍轻微不均衡兼容 HPA。
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: balloon-game
      containers:
        - name: balloon-game
          # infra-019: explicit tag (overlays may override via kustomize images:newTag); 避免隐式 :latest 拉取。
          image: gcr.io/PROJECT_ID/balloon-game:latest
          ports:
            - containerPort: 8080
          env:
            # ── 多实例水平扩展 (ADR-005) ──
            # INSTANCE_ID: 稳定实例标识 (Pod 名); POD_IP: 供其它实例反向代理拨号; PORT 与 containerPort 一致。
            - name: INSTANCE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: PORT
              value: "8080"
            # ── 多区域路由 (ADR-016) ──
            # DEPLOY_REGION / REGION_WS_ENDPOINT: 每区域 overlay ConfigMap 注入，决定 home region 与就近入口。
            - name: DEPLOY_REGION
              valueFrom:
                configMapKeyRef:
                  name: balloon-game-region
                  key: deploy-region
            - name: REGION_WS_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: balloon-game-region
                  key: region-ws-endpoint
            # DB_DIALECT: 多区域生产为 cockroach (ADR-015)，单区域默认 postgres。
            - name: DB_DIALECT
              valueFrom:
                configMapKeyRef:
                  name: balloon-game-region
                  key: db-dialect
            # TRUSTED_PROXY_CIDRS: Ingress/LB 代理 CIDR，用于 ExtractClientIP 与 admin lockout。
            - name: TRUSTED_PROXY_CIDRS
              valueFrom:
                configMapKeyRef:
                  name: balloon-game-region
                  key: trusted-proxy-cidrs
            # INTERNAL_PROXY_SECRET: 跨实例 /internal 路由的共享密钥。
            - name: INTERNAL_PROXY_SECRET
              valueFrom:
                secretKeyRef:
                  name: balloon-game-secrets
                  key: internal-proxy-secret
            # infra-021: 精确 env valueFrom 替代 envFrom 整 Secret 挂载，避免意外新增 key 静默注入（最小权限）。
            - name: JWT_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: balloon-game-secrets
                  key: jwt-private-key
            - name: JWT_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: balloon-game-secrets
                  key: jwt-public-key
            - name: ADMIN_JWT_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: balloon-game-secrets
                  key: admin-jwt-private-key
                  optional: true
            - name: ADMIN_JWT_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: balloon-game-secrets
                  key: admin-jwt-public-key
                  optional: true
            - name: ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: balloon-game-secrets
                  key: encryption-key
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: balloon-game-secrets
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: balloon-game-secrets
                  key: redis-url
            - name: REDIS_EPHEMERAL_URL
              valueFrom:
                secretKeyRef:
                  name: balloon-game-secrets
                  key: redis-ephemeral-url
                  optional: true
            - name: REDIS_REGIONAL_URL
              valueFrom:
                secretKeyRef:
                  name: balloon-game-secrets
                  key: redis-regional-url
                  optional: true
            - name: REDIS_PUBSUB_URL
              valueFrom:
                secretKeyRef:
                  name: balloon-game-secrets
                  key: redis-pubsub-url
                  optional: true
            - name: RESEND_API_KEY
              valueFrom:
                secretKeyRef:
                  name: balloon-game-secrets
                  key: resend-api-key
                  optional: true
            - name: EMAIL_FROM
              valueFrom:
                secretKeyRef:
                  name: balloon-game-secrets
                  key: email-from
                  optional: true
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: balloon-game-secrets
                  key: admin-password
            - name: AUDIT_SECRET
              valueFrom:
                secretKeyRef:
                  name: balloon-game-secrets
                  key: audit-secret
                  optional: true
            - name: ALLOWED_ORIGINS
              valueFrom:
                secretKeyRef:
                  name: balloon-game-secrets
                  key: allowed-origins
                  optional: true
            - name: METRICS_USER
              valueFrom:
                secretKeyRef:
                  name: balloon-game-secrets
                  key: metrics-user
                  optional: true
            - name: METRICS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: balloon-game-secrets
                  key: metrics-password
                  optional: true
          # 企业为何需要：无 requests 时调度器无法合理调度，可能被驱逐到资源不足节点。
          resources:
            requests:
              cpu: "250m"
              memory: "128Mi"
            limits:
              cpu: "1"
              memory: "512Mi"
          # startup probe 区分'启动慢'与'死锁'，避免慢启动期被 liveness 反复杀死。
          startupProbe:
            httpGet:
              path: /health/live
              port: 8080
            failureThreshold: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
