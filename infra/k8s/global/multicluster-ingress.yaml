# Global anycast entrypoint via GKE Multi-Cluster Ingress (ADR-014).
#
# 客户端通过单一 Anycast VIP 接入，GCLB 就近路由到最近健康区域集群；该区域内再由
# owner 反向代理路由到房间 owner（ADR-005）。若房间属于另一区域，应用层返回就近
# ws_endpoint 让客户端直连房间 home region（ADR-016，绝不跨区转发游戏帧）。
#
# 前置：在 config cluster 上启用 MCI（gcloud container fleet ingress enable），
# 并将各区域集群注册到同一 fleet。MultiClusterService 选取各集群的后端 Pod。
---
apiVersion: networking.gke.io/v1
kind: MultiClusterService
metadata:
  name: balloon-game-mcs
  namespace: balloon-game
spec:
  template:
    spec:
      selector:
        app: balloon-game
      ports:
        - name: http
          port: 80
          targetPort: 8080
---
apiVersion: networking.gke.io/v1
kind: MultiClusterIngress
metadata:
  name: balloon-game-mci
  namespace: balloon-game
  annotations:
    networking.gke.io/static-ip: balloon-game-global-ip   # 预留的全局 Anycast IP
    # 托管证书覆盖 wss:// 多区域子域 + 顶级域。
    networking.gke.io/pre-shared-certs: balloon-game-cert
spec:
  template:
    spec:
      backend:
        serviceName: balloon-game-mcs
        servicePort: 80
      # WebSocket 长连接：充足超时由 BackendConfig 设置（见下）；不再启用会话亲和性（infra-024）。
---
apiVersion: cloud.google.com/v1
kind: BackendConfig
metadata:
  name: balloon-game-backendconfig
  namespace: balloon-game
spec:
  # WebSocket 升级需要长超时；默认 30s 会切断长连接。
  timeoutSec: 86400
  connectionDraining:
    drainingTimeoutSec: 60
  # infra-024: 移除 sessionAffinity: CLIENT_IP。WebSocket 升级后连接是长连接，
  # 不依赖客户端 IP 粘性；CLIENT_IP 亲和性反而会导致负载在 backend Pod 间倾斜
  # （特别是当客户端经过 CGNAT/企业出口共享 IP 时）。owner 反向代理在应用层
  # 处理房间路由，LB 层应保持均匀轮询。
  healthCheck:
    type: HTTP
    requestPath: /health/ready
    port: 8080
