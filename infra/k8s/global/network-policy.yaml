# Defense-in-depth network policy (ADR-014/016): 区域内 owner 反向代理仅同命名空间 Pod 互访；跨区域控制面由 mTLS 保护。
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: balloon-game-internal-proxy
  namespace: balloon-game
spec:
  podSelector:
    matchLabels:
      app: balloon-game
  policyTypes:
    - Ingress
  ingress:
    # 客户端入口（80→8080）：仅允许 GCP 健康检查与集群内 Pod。
    - from:
        - ipBlock:
            cidr: 35.191.0.0/16
        - ipBlock:
            cidr: 130.211.0.0/22
        # infra-026: 收窄 10.0.0.0/8 → 10.0.0.0/16（VPC 主 CIDR）；过宽 /8 允许任意 RFC1918 来源。
        - ipBlock:
            cidr: 10.0.0.0/16
      ports:
        - protocol: TCP
          port: 8080
    # 区域内实例间反向代理：仅同命名空间（同区域集群）Pod。
    - from:
        - podSelector:
            matchLabels:
              app: balloon-game
      ports:
        - protocol: TCP
          port: 8080
---
# Default deny all egress traffic (defense in depth).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-egress
  namespace: balloon-game
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress: []
---
# Allow DNS resolution (kube-dns / CoreDNS).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: balloon-game
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
---
# Allow egress to Cloud SQL (PostgreSQL) and Memorystore (Redis) within VPC.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-db-redis-egress
  namespace: balloon-game
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        # infra-026: 收窄到 10.0.0.0/16（VPC 主 CIDR），避免 /8 允许出站到任意 RFC1918。
        - ipBlock:
            cidr: 10.0.0.0/16
      ports:
        - protocol: TCP
          port: 5432
        - protocol: TCP
          port: 6379
---
# infra-027: 允许 HTTPS 出站（443）——应用访问 Resend API / Secret Manager / Cloud KMS / OAuth provider。
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-https-egress
  namespace: balloon-game
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443
---
# Allow health check probes from kube-system (kubelet / GKE node probes).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-health-check-probes
  namespace: balloon-game
spec:
  podSelector:
    matchLabels:
      app: balloon-game
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: TCP
          port: 8080
