# Defense-in-depth network policy (ADR-014/016).
#
# 1) 区域内 owner 反向代理（/internal/lobby/{code}/ws）只允许同命名空间 Pod 互访，
#    禁止任何跨区域/外部直达 internal 端口——跨区域绝不转发游戏帧（ADR-016）。
# 2) 跨区域控制面（CRDB SQL、可观测性聚合）应通过 mTLS（CRDB 节点证书 / 服务网格
#    mTLS）保护；本策略限制出入口，mTLS 由 CRDB 证书与 mesh sidecar 提供（见
#    docs/architecture/multi-region-topology.md）。
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: balloon-game-internal-proxy
  namespace: balloon-game
spec:
  podSelector:
    matchLabels:
      app: balloon-game
  policyTypes:
    - Ingress
  ingress:
    # 客户端入口（80→8080）：仅允许 GCP 健康检查与集群内 Pod。
    - from:
        - ipBlock:
            cidr: 35.191.0.0/16
        - ipBlock:
            cidr: 130.211.0.0/22
        # infra-026: 收窄 10.0.0.0/8 → 10.0.0.0/16（典型 VPC 主 CIDR）。
        # 实际部署应替换为 VPC 真实 CIDR；过宽的 /8 会允许任意 RFC1918 来源访问 8080。
        - ipBlock:
            cidr: 10.0.0.0/16
      ports:
        - protocol: TCP
          port: 8080
    # 区域内实例间反向代理：仅同命名空间（同区域集群）Pod。
    - from:
        - podSelector:
            matchLabels:
              app: balloon-game
      ports:
        - protocol: TCP
          port: 8080
---
# Default deny all egress traffic (defense in depth).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-egress
  namespace: balloon-game
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress: []
---
# Allow DNS resolution (kube-dns / CoreDNS).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: balloon-game
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
---
# Allow egress to Cloud SQL (PostgreSQL) and Memorystore (Redis) within VPC.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-db-redis-egress
  namespace: balloon-game
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        # infra-026: 收窄 10.0.0.0/8 → 10.0.0.0/16（VPC 主 CIDR）。
        # /8 会允许出站到任意 RFC1918 地址（含其他租户/项目的私有 IP）。
        - ipBlock:
            cidr: 10.0.0.0/16
      ports:
        - protocol: TCP
          port: 5432
        - protocol: TCP
          port: 6379
---
# infra-027: 允许 HTTPS 出站（443）——应用需要访问 Resend API、Secret Manager、
# Cloud KMS、OAuth provider 等外部 HTTPS 端点。default-deny-egress 之后必须显式放行。
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-https-egress
  namespace: balloon-game
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443
---
# Allow health check probes from kube-system (kubelet / GKE node probes).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-health-check-probes
  namespace: balloon-game
spec:
  podSelector:
    matchLabels:
      app: balloon-game
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: TCP
          port: 8080
