# Defense-in-depth network policy (ADR-014/016).
#
# 1) 区域内 owner 反向代理（/internal/lobby/{code}/ws）只允许同命名空间 Pod 互访，
#    禁止任何跨区域/外部直达 internal 端口——跨区域绝不转发游戏帧（ADR-016）。
# 2) 跨区域控制面（CRDB SQL、可观测性聚合）应通过 mTLS（CRDB 节点证书 / 服务网格
#    mTLS）保护；本策略限制出入口，mTLS 由 CRDB 证书与 mesh sidecar 提供（见
#    docs/architecture/multi-region-topology.md）。
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: balloon-game-internal-proxy
  namespace: balloon-game
spec:
  podSelector:
    matchLabels:
      app: balloon-game
  policyTypes:
    - Ingress
  ingress:
    # 客户端入口（80→8080）：来自 MCI/GCLB 健康检查与负载均衡器。
    - from:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 8080
    # 区域内实例间反向代理：仅同命名空间（同区域集群）Pod。
    - from:
        - podSelector:
            matchLabels:
              app: balloon-game
      ports:
        - protocol: TCP
          port: 8080
---
# Default deny all egress traffic (defense in depth).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-egress
  namespace: balloon-game
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress: []
---
# Allow DNS resolution (kube-dns / CoreDNS).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: balloon-game
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
---
# Allow egress to Cloud SQL (PostgreSQL) and Memorystore (Redis) within VPC.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-db-redis-egress
  namespace: balloon-game
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - ipBlock:
            cidr: 10.0.0.0/8
      ports:
        - protocol: TCP
          port: 5432
        - protocol: TCP
          port: 6379
---
# Allow health check probes from kube-system (kubelet / GKE node probes).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-health-check-probes
  namespace: balloon-game
spec:
  podSelector:
    matchLabels:
      app: balloon-game
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: TCP
          port: 8080
