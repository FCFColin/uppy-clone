# Single regional overlay template (ADR-014).
#
# Previously three per-region overlays (us-east1 / europe-west1 / asia-southeast1)
# existed with identical structure and only region-specific string values differing.
# Merged into this single template; region values are substituted via sed during
# CI/CD (same mechanism as __GCP_PROJECT_ID__ / __IMAGE_TAG__).
#
# Substitution variables (replaced by CI/CD sed step):
#   __REGION__              — e.g. us-east1, europe-west1, asia-southeast1
#   __REGION_WS_ENDPOINT__  — e.g. wss://us.balloon.example
#
# NOTE(module-infra-overlays-001): True per-region isolation (independent GSAs,
# per-region Redis, per-region Secret references) is a future goal. Currently
# all regions deploy the same config with only region-specific string values
# differing.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: balloon-game

resources:
  - ../../base
  - ../../global

images:
  # infra-010: __GCP_PROJECT_ID__ is replaced during CI/CD via sed.
  # Using a delimited placeholder avoids false matches that plain PROJECT_ID caused.
  - name: gcr.io/__GCP_PROJECT_ID__/balloon-game
    newName: gcr.io/__GCP_PROJECT_ID__/balloon-game
    newTag: __IMAGE_TAG__

patches:
  - target:
      kind: ConfigMap
      name: balloon-game-region
    patch: |
      - op: replace
        path: /data/deploy-region
        value: __REGION__
      - op: replace
        path: /data/region-ws-endpoint
        value: __REGION_WS_ENDPOINT__
      - op: replace
        path: /data/db-dialect
        value: postgres
      - op: replace
        path: /data/trusted-proxy-cidrs
        value: __TRUSTED_PROXY_CIDRS__
  - target:
      kind: StatefulSet
      name: balloon-game
    patch: |
      - op: replace
        path: /spec/template/metadata/labels/region
        value: __REGION__
  - target:
      kind: ServiceAccount
      name: balloon-game
    patch: |
      - op: add
        path: /metadata/annotations
        value:
          iam.gke.io/gcp-service-account: balloon-game@__GCP_PROJECT_ID__.iam.gserviceaccount.com