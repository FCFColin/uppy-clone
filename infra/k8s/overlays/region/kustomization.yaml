# Single regional overlay template (ADR-014): 三个 per-region overlay 合并为单模板，region 值由 CI/CD sed 替换。
# 替换变量: __REGION__ / __REGION_WS_ENDPOINT__ / __TRUSTED_PROXY_CIDRS__ / __GCP_PROJECT_ID__ / __IMAGE_TAG__。
# NOTE(module-infra-overlays-001): 真·per-region 隔离 (独立 GSA/Redis/Secret) 是未来目标，目前仅 string 值差异。
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: balloon-game

resources:
  - ../../base
  - ../../global

images:
  # infra-010: __GCP_PROJECT_ID__ 由 CI/CD sed 替换; delimited placeholder 避免 plain PROJECT_ID 误匹配。
  - name: gcr.io/__GCP_PROJECT_ID__/balloon-game
  newName: gcr.io/__GCP_PROJECT_ID__/balloon-game
  newTag: __IMAGE_TAG__

patches:
  - target:
      kind: ConfigMap
      name: balloon-game-region
    patch: |
      - op: replace
        path: /data/deploy-region
        value: __REGION__
      - op: replace
        path: /data/region-ws-endpoint
        value: __REGION_WS_ENDPOINT__
      - op: replace
        path: /data/db-dialect
        value: postgres
      - op: replace
        path: /data/trusted-proxy-cidrs
        value: __TRUSTED_PROXY_CIDRS__
  - target:
      kind: StatefulSet
      name: balloon-game
    patch: |
      - op: replace
        path: /spec/template/metadata/labels/region
        value: __REGION__
  - target:
      kind: ServiceAccount
      name: balloon-game
    patch: |
      - op: add
        path: /metadata/annotations
        value:
          iam.gke.io/gcp-service-account: balloon-game@__GCP_PROJECT_ID__.iam.gserviceaccount.com