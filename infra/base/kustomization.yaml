# Base kustomization for the WebSocket/Game tier (ADR-014 multi-region).
# Per-region overlays live in infra/overlays/<region>/ and patch region config,
# Workload Identity, image, and namespace on top of this base.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - service.yaml
  - redis.yaml
  - hpa.yaml
  - pod-disruption-budget.yaml
  - region-config.yaml

labels:
  - pairs:
      app.kubernetes.io/part-of: balloon-game
