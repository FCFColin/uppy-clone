name: Setup Go Env
description: Shared Go toolchain + module cache setup for all Go CI jobs (v2-R-75 SHA-pinned)
# v2-R-75: 所有 third-party Actions 通过 commit SHA digest pin（防 tag 被移动攻击）。
# 版本号以注释 `# vX.Y.Z` 标注，便于审阅与 Dependabot 升级追踪。
inputs:
  go-version:
    description: Go version to install
    required: false
    default: '1.26'
  cache-dependency-path:
    description: Path to go.sum for module cache key
    required: false
    default: backend/go.sum
runs:
  using: composite
  steps:
    - name: Setup Go
      uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
      with:
        go-version: ${{ inputs.go-version }}
        cache-dependency-path: ${{ inputs.cache-dependency-path }}
