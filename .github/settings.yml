# Repository settings (Probot Settings / GitHub Branch Protection)
# Enterprise: Branch protection enforces code review, CI gating, and
# immutable history on the main branch — preventing force-push and
# non-linear history that would break traceability and rollback.

branches:
  - name: main
    protection:
      required_pull_request_reviews:
        required_approving_review_count: 1
        require_code_owner_reviews: true
        dismiss_stale_reviews: true
        require_last_push_approval: false
      required_status_checks:
        strict: true
        contexts:
          # ci-cd.yml
          - "Quality Gate"
          - "E2E Gameplay Tests（核心玩法验证）"
          - "E2E Performance Tests（性能验证）"
          # go-ci.yml
          - "Test"
          - "Lint"
          - "Vet"
          - "Integration Tests (testcontainers)"
          - "Secret Scanning (detect-secrets)"
          - "OpenAPI Validate"
          - "Security Scan"
          - "Secret Scanning (gitleaks)"
          - "Container Scan"
          - "Migration Test"
          - "Docker Image Pinning"
          - "License Check"
          - "Build & Push"
      enforce_admins: true
      restrictions: null
      allow_force_pushes: false
      allow_deletions: false
      required_linear_history: true
