name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: TypeScript Check
        run: npx tsc --noEmit
      - name: Install frontend dependencies
        run: cd frontend && npm ci
      - name: Lint frontend
        run: cd frontend && npm run lint
        continue-on-error: true  # Start as non-blocking, upgrade to blocking later
      - name: npm audit (high severity)
        run: cd frontend && npm audit --audit-level=high
        continue-on-error: true  # Start as non-blocking
      - name: Unit Tests (Coverage ≥ 80%)
        run: npx vitest run --coverage
        # Coverage threshold may not be met yet; non-blocking until baseline improves
        continue-on-error: true
      - name: Integration Tests
        run: npx vitest run tests/integration --coverage.enabled=false

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - name: Dependency Review
        uses: actions/dependency-review-action@v4

  e2e-gameplay:
    name: E2E Gameplay Tests（核心玩法验证）
    needs: quality-gate
    runs-on: ubuntu-latest
    # Playwright E2E tests need a running backend which CI may not provide; non-blocking
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Install Playwright
        run: npx playwright install --with-deps chromium
      - name: Run Core Gameplay E2E Tests
        run: npx playwright test tests/e2e/gameplay.spec.ts --reporter=html
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-gameplay-report-${{ github.sha }}
          path: playwright-report/
          retention-days: 30

  e2e-performance:
    name: E2E Performance Tests（性能验证）
    needs: quality-gate
    runs-on: ubuntu-latest
    # Playwright E2E tests need a running backend which CI may not provide; non-blocking
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Install Playwright
        run: npx playwright install --with-deps chromium
      - name: Run Performance E2E Tests
        run: npx playwright test tests/e2e/performance.spec.ts --reporter=html
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-performance-report-${{ github.sha }}
          path: playwright-report/
          retention-days: 30

  deploy:
    name: Deploy to Production
    needs: [quality-gate, e2e-gameplay, e2e-performance]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      # Deploy target: Google Cloud Run (ADR-001). Wrangler/Cloudflare Workers
      # deploy removed. The authoritative container build & push pipeline is
      # the build-push job in .github/workflows/go-ci.yml, which pushes the
      # image to GCR for Cloud Run. This job now only emits a deployment
      # summary after the upstream quality/E2E gates pass.
      - name: Deployment Summary
        if: always()
        run: |
          echo "## Deploy Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment:** production" >> $GITHUB_STEP_SUMMARY
          echo "- **Ref:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Actor:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Workflow:** ${{ github.workflow }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Run:** ${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Triggered Jobs" >> $GITHUB_STEP_SUMMARY
          echo "- quality-gate" >> $GITHUB_STEP_SUMMARY
          echo "- e2e-gameplay" >> $GITHUB_STEP_SUMMARY
          echo "- e2e-performance" >> $GITHUB_STEP_SUMMARY
          echo "- deploy (summary only — image build/push via go-ci.yml build-push)" >> $GITHUB_STEP_SUMMARY
