name: CI/CD Pipeline

# v2-R-75: 所有 third-party Actions 通过 commit SHA digest pin（防 tag 被移动攻击）。
# 版本号以注释 `# vX.Y.Z` 标注，便于审阅与 Dependabot 升级追踪。
# Dependabot 已配置 github-actions 生态（.github/dependabot.yml），自动维护 SHA 升级 PR。
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install frontend dependencies
        run: cd frontend && npm ci
      - name: TypeScript Check
        run: cd frontend && npm run typecheck
      - name: Lint frontend
        run: cd frontend && npm run lint
      - name: npm audit (high severity)
        run: cd frontend && npm audit --audit-level=high
        continue-on-error: false
      - name: Frontend Unit Tests
        run: cd frontend && npm run test:frontend
      - name: Frontend coverage governance
        run: bash scripts/ci/check-coverage.sh frontend
      - name: Check repo layout
        run: go run scripts/ci/check-repo-layout.go

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Dependency Review
        uses: actions/dependency-review-action@595b5aeba73380359d98a5e087f648dbb0edce1b # v4.7.3

  terraform-validate:
    # v2-R-22：IaC 变更门禁。fmt + init(无 backend) + validate。
    # 不访问 GCS state bucket（用 -backend=false），无需 GCP 凭据，PR 阶段即可运行。
    name: Terraform Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: "1.9.8"
          terraform_wrapper: false
      - name: terraform fmt -check
        run: terraform -chdir=infra/terraform fmt -check -recursive
      - name: terraform init -backend=false
        run: terraform -chdir=infra/terraform init -backend=false
      - name: terraform validate
        run: terraform -chdir=infra/terraform validate

  e2e:
    name: E2E Tests (${{ matrix.browser }} / ${{ matrix.spec }})
    needs: [quality-gate]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        spec: [gameplay, multiplayer, reconnect, error_handling, cross_page, auth, admin, security, network_boundary, concurrency]
        browser: [chromium, firefox, webkit]
    services:
      postgres:
        image: postgres:16.4-alpine3.20
        env:
          POSTGRES_USER: uppy
          POSTGRES_PASSWORD: uppy
          POSTGRES_DB: uppy
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7.4.0-alpine3.20
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      JWT_PRIVATE_KEY: ${{ secrets.CI_JWT_PRIVATE_KEY_PEM }}
      ADMIN_JWT_PRIVATE_KEY: ${{ secrets.CI_ADMIN_JWT_PRIVATE_KEY_PEM }}
      ADMIN_PASSWORD: ci-test-admin-password
      ENCRYPTION_KEY: ${{ secrets.CI_ENCRYPTION_KEY }}
      DATABASE_URL: postgres://uppy:uppy@localhost:5432/uppy?sslmode=disable
      REDIS_URL: localhost:6379
      ENABLE_HSTS: "false"
      MIGRATIONS_DIR: backend/migrations
      FRONTEND_DIR: frontend/dist
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: ./.github/actions/e2e-setup
      - name: Start backend
        run: |
          nohup ./server > server.log 2>&1 &
          echo $! > server.pid
          ready=0
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/health/live; then
              ready=1
              break
            fi
            sleep 2
          done
          if [ "$ready" -ne 1 ]; then
            echo "Backend failed to become ready"
            cat server.log
            exit 1
          fi
      - name: Install Playwright
        run: npx playwright install --with-deps chromium firefox webkit
      - name: Run E2E Tests
        run: PROD_E2E=1 E2E_BASE_URL=http://localhost:8080 npx playwright test tests/e2e/${{ matrix.spec }}.spec.ts --project=${{ matrix.browser }} --reporter=html
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: playwright-${{ matrix.spec }}-report-${{ github.sha }}
          path: playwright-report/
          retention-days: 30

  e2e-result:
    # Aggregator job for branch protection: GitHub requires each matrix
    # combination as a separate required check. This single job depends on
    # the full matrix and provides one stable name "E2E Tests" for
    # settings.yml required_status_checks. See audit project-06-006.
    name: E2E Tests
    needs: [e2e]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check E2E matrix result
        run: |
          if [ "${{ needs.e2e.result }}" != "success" ]; then
            echo "::error::E2E tests failed (result: ${{ needs.e2e.result }})"
            exit 1
          fi
          echo "All E2E tests passed"

  integration:
    name: Go Integration Tests
    needs: [quality-gate]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: '1.26'
          cache-dependency-path: backend/go.sum
      - name: Run handler integration tests
        run: cd backend && go test -tags=integration ./internal/handler/... -timeout 300s -v -count=1
      - name: Run game integration tests
        run: cd backend && go test -tags=integration ./internal/game/... -timeout 300s -v -count=1
      - name: Run store integration tests
        run: cd backend && go test -tags=integration ./internal/store/... -timeout 300s -v -count=1

  release-config-check:
    name: Release Config Verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Verify release configuration
        shell: pwsh
        run: powershell -File scripts/ci/verify-release-config.ps1

  deploy:
    name: Deploy to GKE (multi-region)
    # NOTE(module-infra-workflows-001): Deploy does NOT depend on go-ci.yml's
    # build-push job (separate workflow). It polls for the image via
    # `gcloud container images describe` (600s timeout) instead. If go-ci.yml
    # fails or is slow, deploy wastes 10 minutes then fails. A `workflow_run`
    # trigger linking go-ci.yml completion to ci-cd.yml's deploy would be more
    # robust — refactor when CI pipeline is consolidated.
    needs: [quality-gate, e2e-result, integration, terraform-validate, release-config-check]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production
    # 多区域滚动部署：逐区域 apply kustomize overlay（ADR-014）。各区域用各自的
    # GKE 集群凭据。Cloud Run 双平台已废弃（见 ADR-013 更新 / ADR-016）。
    strategy:
      max-parallel: 1
      matrix:
        region: [us-east1, europe-west1, asia-southeast1]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # Workload Identity Federation：免长期 JSON 密钥（与运行时 ADR-014 一致）。
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@b7593ed2efd1c1617e1b0254da33b86225adb2a5 # v2.1.12
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SA }}

      - name: Set up Cloud SDK + GKE auth plugin
        uses: google-github-actions/setup-gcloud@6a7c903a70c8625ed6700fa299f5ddb4ca6022e9 # v2.1.5
        with:
          install_components: gke-gcloud-auth-plugin

      - name: Verify release config
        shell: pwsh
        run: powershell -File scripts/ci/verify-release-config.ps1

      - name: Wait for container image (build-push from Go CI)
        run: |
          IMAGE="gcr.io/${{ secrets.GCP_PROJECT_ID }}/balloon-game:${{ github.sha }}"
          for i in $(seq 1 30); do
            if gcloud container images describe "$IMAGE" >/dev/null 2>&1; then
              echo "Image ready: $IMAGE"
              exit 0
            fi
            echo "Waiting for $IMAGE ($i/30)..."
            sleep 20
          done
          echo "::error::Image not found: $IMAGE (Go CI build-push may still be running)"
          exit 1

      - name: Verify container signature (cosign)
        uses: sigstore/cosign-installer@3454372f43399081ed03b604cb2d021dabca52bb # v3.8.2
      - name: Cosign verify image
        env:
          IMAGE: gcr.io/${{ secrets.GCP_PROJECT_ID }}/balloon-game:${{ github.sha }}
        run: |
          cosign verify "$IMAGE" \
            --certificate-identity-regexp="https://github.com/${{ github.repository }}/.github/workflows/go-ci.yml@refs/heads/main" \
            --certificate-oidc-issuer="https://token.actions.githubusercontent.com"

      - name: Get GKE credentials (${{ matrix.region }})
        run: |
          gcloud container clusters get-credentials "balloon-game-${{ matrix.region }}" \
            --region "${{ matrix.region }}" --project "${{ secrets.GCP_PROJECT_ID }}"

      - name: Deploy pinned image (${{ matrix.region }})
        env:
          IMAGE: gcr.io/${{ secrets.GCP_PROJECT_ID }}/balloon-game:${{ github.sha }}
          TRUSTED_PROXY_CIDRS: ${{ secrets.TRUSTED_PROXY_CIDRS }}
        run: |
          cd "infra/k8s/overlays/${{ matrix.region }}"
          # infra-010: Use delimited __GCP_PROJECT_ID__ placeholder to avoid
          # false matches that plain PROJECT_ID caused. Same for __IMAGE_TAG__
          # and __TRUSTED_PROXY_CIDRS__.
          kubectl kustomize . \
            | sed "s/__GCP_PROJECT_ID__/${{ secrets.GCP_PROJECT_ID }}/g" \
            | sed "s/__IMAGE_TAG__/${{ github.sha }}/g" \
            | sed "s|__TRUSTED_PROXY_CIDRS__|${TRUSTED_PROXY_CIDRS}|g" \
            | kubectl apply --server-side -f -

      - name: Wait for rollout (${{ matrix.region }})
        run: |
          kubectl -n balloon-game rollout status statefulset/balloon-game --timeout=300s

      - name: Deployment Summary
        if: always()
        run: |
          echo "## Deploy Summary — ${{ matrix.region }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Target:** GKE ${{ matrix.region }} (StatefulSet balloon-game)" >> $GITHUB_STEP_SUMMARY
          echo "- **Image:** gcr.io/.../balloon-game:${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Ref:** ${{ github.ref_name }} @ ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
