name: Go CI

# v2-R-75: 所有 third-party Actions 通过 commit SHA digest pin（防 tag 被移动攻击）。
# 版本号以注释 `# vX.Y.Z` 标注，便于审阅与 Dependabot 升级追踪。
# Dependabot 已配置 github-actions 生态（.github/dependabot.yml），自动维护 SHA 升级 PR。
on:
  push:
    branches: [main, develop]
    paths: ['backend/**']
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: ./.github/actions/setup-go-env
      - run: go mod download
      - name: Run tests
        run: |
          PKGS=$(go list ./internal/... | grep -v /internal/testutil | grep -v /internal/testsecrets)
          go test $PKGS -timeout 120s -race -short -p 1 -coverprofile=unit.out -covermode=atomic
      - name: Upload coverage
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: coverage-out
          path: backend/unit.out
      - name: Check unit coverage governance
        run: bash ../scripts/ci/check-coverage.sh unit unit.out

  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: ./.github/actions/setup-go-env
      - name: golangci-lint
        uses: golangci/golangci-lint-action@4afd733a84b1f43292c63897423277bb7f4313a9 # v8.0.0
        with:
          working-directory: backend
          version: v2.3.0

  vet:
    name: Vet
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: ./.github/actions/setup-go-env
      - run: go vet ./...

  bench:
    name: Benchmark
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: ./.github/actions/setup-go-env
      - name: Run benchmarks
        run: go test -bench=. -benchmem -run=^$ ./internal/protocol/ ./internal/game/ -count=1 | tee ../docs/development/benchmarks-go-microbench.md
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: benchmarks
          path: docs/development/benchmarks-go-microbench.md

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: ./.github/actions/setup-go-env
      - name: govulncheck
        # v2-R-15: 固定版本 v1.1.4（替代 @latest），保证供应链可重现构建。
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
          govulncheck -test=false ./cmd/... ./internal/...

  security-scan:
    # Merged job: gitleaks + detect-secrets + container-scan (Trivy) + CodeQL.
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'
      - name: Run detect-secrets
        run: |  # pragma: allowlist secret
          pip install detect-secrets==1.5.0
          detect-secrets scan --baseline .secrets.baseline \
            --exclude-files 'backend/internal/.*_test\.go' \
            --exclude-files '\.github/workflows/.*' \
            --exclude-files 'backend/internal/testsecrets/.*'
      - name: Build Docker image
        run: docker build -t app:scan .
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          image-ref: 'app:scan'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
      - uses: github/codeql-action/init@181d5eefc20863364f96762470ba6f862bdef56b # v3.29.2
        with:
          languages: go, javascript
      - uses: github/codeql-action/analyze@181d5eefc20863364f96762470ba6f862bdef56b # v3.29.2

  migration:
    name: Migration Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: ./.github/actions/setup-go-env
      - name: Install golang-migrate
        # v2-R-15: 固定版本 v4.18.2（替代 @latest），保证供应链可重现构建。
        run: go install -tags 'postgres' github.com/golang-migrate/migrate/v4/cmd/migrate@v4.18.2
      - name: Ensure DB roles
        run: |
          PGPASSWORD=test psql -h localhost -U test -d testdb -v ON_ERROR_STOP=1 <<'SQL'
          DO $$
          BEGIN
            IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'app_user') THEN
              CREATE ROLE app_user WITH LOGIN PASSWORD 'change_in_production' NOCREATEDB NOCREATEROLE NOSUPERUSER;
            END IF;
            IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'migrator') THEN
              CREATE ROLE migrator WITH LOGIN PASSWORD 'change_in_production' NOCREATEDB NOCREATEROLE NOSUPERUSER;
            END IF;
          $$;
          SQL
      - name: Run migrations up
        run: |
          migrate -path backend/migrations -database "postgres://test:test@localhost:5432/testdb?sslmode=disable" up
      - name: Run migrations down
        run: |
          migrate -path backend/migrations -database "postgres://test:test@localhost:5432/testdb?sslmode=disable" down -all
      - name: Run migrations up again (idempotency)
        run: |
          migrate -path backend/migrations -database "postgres://test:test@localhost:5432/testdb?sslmode=disable" up

  docker-pin-check:
    name: Docker Image Pinning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Verify Dockerfile uses @sha256 digests (SLSA L2)
        run: bash scripts/ci/check-docker-digests.sh Dockerfile
      - name: Reject :latest tags in compose
        run: |
          set -e
          if grep -nE 'image:.*:latest|FROM .*:latest' docker-compose.yml; then
            echo "::error::docker-compose.yml must not use :latest"
            exit 1
          fi

  license-check:
    name: License Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: ./.github/actions/setup-go-env
      - name: Generate third-party license report
        # v2-R-15: 固定版本 v1.6.0（替代 @latest），保证供应链可重现构建。
        run: |
          go install github.com/google/go-licenses@v1.6.0
          go-licenses report ./... > ../third-party-licenses.txt
      - name: Upload license report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: third-party-licenses
          path: third-party-licenses.txt
      - name: Verify no forbidden licenses (GPL/AGPL)
        run: |
          if grep -iE 'GPL|AGPL' ../third-party-licenses.txt; then
            echo "::error::Forbidden license detected (GPL/AGPL)"
            exit 1
          fi
          echo "License check passed"

  openapi:
    name: OpenAPI Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '22'
      - run: npx --yes @apidevtools/swagger-cli validate docs/api/openapi.yaml

  api-consistency:
    name: API Route Consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: ./.github/actions/setup-go-env
      - run: go run ./scripts/ci/check-api-routes.go

  arch-check:
    name: Architecture Rules
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: ./.github/actions/setup-go-env
      - run: go run ./scripts/ci/check-arch-rules.go

  integration:
    name: Integration Tests (testcontainers)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: ./.github/actions/setup-go-env
      - run: go mod download
      - name: Run integration tests
        run: |
          go test -tags=integration ./tests/integration/... -race -timeout 180s -coverprofile=int.out -covermode=atomic
          go test -tags=integration ./internal/worker/... -race -timeout 180s
      - name: Integration coverage governance
        run: bash ../scripts/ci/check-coverage.sh integration int.out

  build-push:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: [test, lint, vet, bench, security, security-scan, migration, docker-pin-check, license-check, openapi, api-consistency, arch-check, integration]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1
      - name: Login to GCR
        uses: docker/login-action@184bdaa0721073962dff0199f1fb9940f07167d1 # v3.5.0
        with:
          registry: gcr.io
          username: _json_key
          password: ${{ secrets.GCR_JSON_KEY }}
      - name: Build and push
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .
          push: true
          # Enterprise rationale: Immutable image tags using git SHA ensure
          # every deployment is traceable to an exact commit. 'latest' tag
          # is mutable and cannot be rolled back reliably.
          tags: |
            gcr.io/${{ secrets.GCP_PROJECT_ID }}/balloon-game:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Sign container image
        if: github.ref == 'refs/heads/main'
        uses: sigstore/cosign-installer@3454372f43399081ed03b604cb2d021dabca52bb # v3.8.2
      - run: cosign sign --yes gcr.io/${{ secrets.GCP_PROJECT_ID }}/balloon-game:${{ github.sha }}
      - name: Generate SBOM
        uses: anchore/sbom-action@0a33c98da4a4d9e35761d803bdde100295ae53d8 # v0.20.5
        with:
          image: gcr.io/${{ secrets.GCP_PROJECT_ID }}/balloon-game:${{ github.sha }}
          format: cyclonedx-json
          output-file: sbom.json
      - name: Upload SBOM
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: sbom
          path: sbom.json