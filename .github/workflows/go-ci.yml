name: Go CI

on:
  push:
    branches: [main, develop]
    paths: ['backend/**']
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - run: go mod download
      - name: Run tests
        run: |
          PKGS=$(go list ./... | grep -v /tests/integration)
          go test $PKGS -timeout 120s -race -short -coverprofile=unit.out -covermode=atomic
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-out
          path: backend/unit.out
      - name: Check unit coverage governance
        run: bash ../scripts/ci/check-coverage.sh unit unit.out

  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          working-directory: backend
          version: v1.64.8

  vet:
    name: Vet
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - run: go vet ./...

  bench:
    name: Benchmark
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: Run benchmarks
        run: go test -bench=. -benchmem -run=^$ ./internal/protocol/ ./internal/game/ -count=1 | tee ../docs/development/benchmarks-go-microbench.md
      - uses: actions/upload-artifact@v4
        with:
          name: benchmarks
          path: docs/development/benchmarks-go-microbench.md

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  gitleaks:
    name: Secret Scanning (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  container-scan:
    name: Container Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t app:scan .
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: 'app:scan'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

  migration:
    name: Migration Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: Install golang-migrate
        run: go install -tags 'postgres' github.com/golang-migrate/migrate/v4/cmd/migrate@latest
      - name: Run migrations up
        run: |
          migrate -path backend/migrations -database "postgres://test:test@localhost:5432/testdb?sslmode=disable" up
      - name: Run migrations down
        run: |
          migrate -path backend/migrations -database "postgres://test:test@localhost:5432/testdb?sslmode=disable" down -all
      - name: Run migrations up again (idempotency)
        run: |
          migrate -path backend/migrations -database "postgres://test:test@localhost:5432/testdb?sslmode=disable" up

  docker-pin-check:
    name: Docker Image Pinning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify Dockerfile uses @sha256 digests (SLSA L2)
        run: bash scripts/ci/check-docker-digests.sh Dockerfile
      - name: Reject :latest tags in compose
        run: |
          set -e
          if grep -nE 'image:.*:latest|FROM .*:latest' docker-compose.yml; then
            echo "::error::docker-compose.yml must not use :latest"
            exit 1
          fi

  license-check:
    name: License Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: Generate third-party license report
        run: |
          go install github.com/google/go-licenses@latest
          go-licenses report ./... > ../third-party-licenses.txt
      - name: Upload license report
        uses: actions/upload-artifact@v4
        with:
          name: third-party-licenses
          path: third-party-licenses.txt
      - name: Verify no forbidden licenses (GPL/AGPL)
        run: |
          if grep -iE 'GPL|AGPL' ../third-party-licenses.txt; then
            echo "::error::Forbidden license detected (GPL/AGPL)"
            exit 1
          fi
          echo "License check passed"

  openapi:
    name: OpenAPI Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npx --yes @apidevtools/swagger-cli validate docs/api/openapi.yaml

  integration:
    name: Integration Tests (testcontainers)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - run: go mod download
      - name: Run integration tests
        run: |
          go test -tags=integration ./tests/integration/... -race -timeout 180s -coverprofile=int.out -covermode=atomic
          go test -tags=integration ./internal/outbox/... ./internal/worker/... -race -timeout 180s
      - name: Integration coverage governance
        run: bash ../scripts/ci/check-coverage.sh integration int.out

  build-push:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: [test, lint, vet, bench, security, gitleaks, container-scan, migration, docker-pin-check, license-check, openapi, integration]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GCR
        uses: docker/login-action@v3
        with:
          registry: gcr.io
          username: _json_key
          password: ${{ secrets.GCR_JSON_KEY }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # Enterprise rationale: Immutable image tags using git SHA ensure
          # every deployment is traceable to an exact commit. 'latest' tag
          # is mutable and cannot be rolled back reliably.
          tags: |
            gcr.io/${{ secrets.GCP_PROJECT_ID }}/balloon-game:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Sign container image
        if: github.ref == 'refs/heads/main'
        uses: sigstore/cosign-installer@v3
      - run: cosign sign --yes gcr.io/${{ secrets.GCP_PROJECT_ID }}/balloon-game:${{ github.sha }}
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: gcr.io/${{ secrets.GCP_PROJECT_ID }}/balloon-game:${{ github.sha }}
          format: cyclonedx-json
          output-file: sbom.json
      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json
