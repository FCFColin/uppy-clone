apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m
    route:
      receiver: default
      group_by: ['alertname', 'region']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
    receivers:
      - name: default
        slack_configs:
          # SECURITY: api_url is a secret — do not embed in ConfigMap.
          # Mount from K8s Secret (ExternalSecret from Secret Manager) and use
          # api_url_file instead. See infra-016 audit finding.
          - api_url_file: /etc/alertmanager/secrets/slack_webhook
            channel: '#alerts'
