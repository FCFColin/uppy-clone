apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m
    route:
      receiver: default
      group_by: ['alertname', 'region']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
    receivers:
      - name: default
        # No notification integration configured. Alerts are visible in the
        # Alertmanager UI at http://alertmanager:9093. To enable Slack/PagerDuty,
        # mount credentials via K8s Secret and add slack_configs/webhook_configs
        # here (see infra-016 audit finding: never embed secrets in ConfigMap).