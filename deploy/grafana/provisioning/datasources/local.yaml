# Grafana datasource provisioning: in-cluster Prometheus (K8s: http://prometheus.balloon-game.svc:9090;
# Local dev: http://prometheus:9090). uid 与 K8s Service 名 `prometheus` 一致，dashboard JSON 通过 datasource.uid 引用。
apiVersion: 1
datasources:
  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    jsonData:
      httpMethod: POST
      timeInterval: 15s
