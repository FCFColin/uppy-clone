# Grafana datasource provisioning: point Grafana at the in-cluster Prometheus.
# Dashboards query metrics from the single-region Prometheus deployment.
apiVersion: 1
datasources:
  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    url: http://prometheus.balloon-game.svc:9090
    isDefault: true
    jsonData:
      httpMethod: POST
      timeInterval: 15s