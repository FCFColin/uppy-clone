# Local / docker-compose Prometheus config (not the K8s ConfigMap variant).
global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  # Backend running inside docker compose `app` service
  - job_name: balloon-game-docker
    metrics_path: /metrics
    static_configs:
      - targets: ['app:8080']

  # Backend running on host via `make dev` / `go run`
  - job_name: balloon-game-host
    metrics_path: /metrics
    static_configs:
      - targets: ['host.docker.internal:8080']

  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
