# Prometheus scrape/eval config (K8s). Consumed by deploy/kustomization.yaml
# configMapGenerator → prometheus-config ConfigMap. Local dev uses deploy/local/prometheus.local.yml.
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: balloon-game
    # See infra-018 audit finding.
    region: __REGION__
rule_files:
  - /etc/prometheus/rules/*.yml
scrape_configs:
  - job_name: balloon-game
    kubernetes_sd_configs:
      - role: pod
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_app]
        action: keep
        regex: balloon-game
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
        action: keep
        regex: "true"
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
        action: replace
        target_label: __metrics_path__
        regex: (.+)
      - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
        action: replace
        regex: ([^:]+)(?::\d+)?;(\d+)
        replacement: $1:$2
        target_label: __address__
      - source_labels: [__meta_kubernetes_pod_label_region]
        target_label: region
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']
