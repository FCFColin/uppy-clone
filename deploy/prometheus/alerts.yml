groups:
  - name: balloon-game
    interval: 30s
    rules:
      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m]) > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Error rate > 5% over 5 minutes"

      - alert: HighLatency
        # infra-032: histogram_quantile 必须先按 `le` label 聚合（sum by (le)），
        # 否则多 Pod/多 method 维度的 bucket 会被错误地当作单一 histogram 计算，
        # 导致分位数结果失真。参考 promtool 官方推荐写法。
        expr: histogram_quantile(0.99, sum by (le) (rate(http_request_duration_seconds_bucket[5m]))) > 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "p99 latency > 500ms over 5 minutes"

      - alert: ConnectionPoolExhaustion
        # v2-C-32: 原指标 pgxpool_acquire_count / pgxpool_release_count 不存在。
        # backend/internal/metrics/metrics.go 实际暴露：
        #   db_pool_in_use_conns (gauge) / db_pool_idle_conns (gauge) / db_pool_acquire_total (counter)
        # 用 in_use / (in_use + idle) 比率表达"连接池接近耗尽"语义（>80% 持续 2m 告警）。
        # 分母为 0 时（pool 未初始化）表达式返回 NaN，不会误触发。
        expr: db_pool_in_use_conns / (db_pool_in_use_conns + db_pool_idle_conns) > 0.8
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Database connection pool near exhaustion (>80% in use)"

      # infra-031: 删除"DiskUsageHigh removed"注释块——这是描述已删除代码的死注释，
      # 既非告警规则也无运行时作用。如需恢复 node_exporter 监控，应在单独 PR 中带
      # scrape config + 规则一起加，而非保留空注释占位。

      # infra-033: MemoryUsage 阈值对齐——原 expr `process_resident_memory_bytes /
      # 1073741824 > 0.9` 实际是"RSS > 0.9 GiB"绝对值，summary 却写"90%"，语义错配。
      # 改为按 container_spec_memory_limit_bytes 比率，分 warning(85%) / critical(95%) 两档。
      # 依赖 cAdvisor 指标（kubelet /metrics/cadvisor），需在 prometheus.yml 增加 scrape。
      - alert: MemoryUsageHigh
        expr: container_memory_working_set_bytes{container="balloon-game"} / container_spec_memory_limit_bytes{container="balloon-game"} > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Container memory usage > 85% of limit"

      - alert: MemoryUsageCritical
        expr: container_memory_working_set_bytes{container="balloon-game"} / container_spec_memory_limit_bytes{container="balloon-game"} > 0.95
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Container memory usage > 95% of limit (OOM imminent)"
