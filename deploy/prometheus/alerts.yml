groups:
  - name: balloon-game
    interval: 30s
    rules:
      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m]) > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Error rate > 5% over 5 minutes"

      - alert: HighLatency
        expr: histogram_quantile(0.99, rate(http_request_duration_seconds_bucket[5m])) > 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "p99 latency > 500ms over 5 minutes"

      - alert: ConnectionPoolExhaustion
        expr: pgxpool_acquire_count - pgxpool_release_count > 20
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Database connection pool near exhaustion"

      # NOTE: DiskUsageHigh removed — no node_exporter deployed to collect node_filesystem_* metrics.
      # Re-add this rule with node_exporter scrape config when infrastructure monitoring is set up.

      - alert: MemoryUsageHigh
        expr: process_resident_memory_bytes / 1073741824 > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Memory usage > 90%"
