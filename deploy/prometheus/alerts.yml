# Prometheus Alerting Rules — single source of truth.
# Merged from former deploy/alertmanager/rules.yml (SLO + game-health) and
# deploy/prometheus/alerts.yml (infra alerts). cAdvisor-dependent alerts
# (MemoryUsageHigh/Critical) removed: prometheus.yml has no cAdvisor scrape,
# so those alerts would never fire.
# Labels match backend/internal/metrics/record.go instrumentation.

groups:
  - name: balloon-game
    interval: 30s
    rules:
      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m]) > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Error rate > 5% over 5 minutes"

      - alert: HighLatency
        # infra-032: histogram_quantile 必须先按 `le` label 聚合（sum by (le)），
        # 否则多 Pod/多 method 维度的 bucket 会被错误地当作单一 histogram 计算，
        # 导致分位数结果失真。参考 promtool 官方推荐写法。
        expr: histogram_quantile(0.99, sum by (le) (rate(http_request_duration_seconds_bucket[5m]))) > 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "p99 latency > 500ms over 5 minutes"

      - alert: ConnectionPoolExhaustion
        # v2-C-32: 原指标 pgxpool_acquire_count / pgxpool_release_count 不存在。
        # backend/internal/metrics/metrics.go 实际暴露：
        #   db_pool_in_use_conns (gauge) / db_pool_idle_conns (gauge) / db_pool_acquire_total (counter)
        # 用 in_use / (in_use + idle) 比率表达"连接池接近耗尽"语义（>80% 持续 2m 告警）。
        # 分母为 0 时（pool 未初始化）表达式返回 NaN，不会误触发。
        expr: db_pool_in_use_conns / (db_pool_in_use_conns + db_pool_idle_conns) > 0.8
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Database connection pool near exhaustion (>80% in use)"

  - name: slo-burn-rate
    rules:
      - alert: AuthSLOBurnRateFast
        expr: |
          (
            sum(rate(auth_requests_total{status=~"4..|5.."}[1h]))
            /
            sum(rate(auth_requests_total[1h]))
          ) > 0.0144
        for: 2m
        labels:
          severity: critical
          slo: auth
        annotations:
          summary: "Auth SLO fast burn rate"
          description: "Auth 4xx/5xx rate is burning error budget quickly"
          runbook: "docs/operations/runbook.md"

      - alert: AuthSLOBurnRateSlow
        expr: |
          (
            sum(rate(auth_requests_total{status=~"4..|5.."}[6h]))
            /
            sum(rate(auth_requests_total[6h]))
          ) > 0.006
        for: 15m
        labels:
          severity: warning
          slo: auth
        annotations:
          summary: "Auth SLO slow burn rate"
          runbook: "docs/operations/runbook.md"

      - alert: WSSLOBurnRateFast
        expr: |
          (
            sum(rate(ws_connection_total{status="rejected"}[1h]))
            /
            sum(rate(ws_connection_total[1h]))
          ) > 0.0144
        for: 2m
        labels:
          severity: critical
          slo: websocket
        annotations:
          summary: "WebSocket SLO fast burn rate"
          runbook: "docs/operations/runbook.md#websocket-连接洪水"

      - alert: WSSLOBurnRateSlow
        expr: |
          (
            sum(rate(ws_connection_total{status="rejected"}[6h]))
            /
            sum(rate(ws_connection_total[6h]))
          ) > 0.006
        for: 15m
        labels:
          severity: warning
          slo: websocket
        annotations:
          summary: "WebSocket SLO slow burn rate"
          runbook: "docs/operations/runbook.md#websocket-连接洪水"

  - name: game-health
    rules:
      - alert: NicknameConfirmRejectedSpike
        expr: rate(nickname_confirm_total{result="rejected"}[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "SET_NICKNAME messages being rejected"
          description: "Players may be stuck on nickname screen — check UTF-8 vs rune validation"
          runbook: "docs/operations/runbook.md"

      - alert: RoomsStuckWaiting
        expr: rooms_by_phase{phase="waiting"} > 0 and rate(game_sessions_total[30m]) == 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Rooms in waiting phase with no recent game starts"
          description: "Possible nickname gate or matchmaking stall"