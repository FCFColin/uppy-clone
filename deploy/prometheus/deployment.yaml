apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  labels:
    app: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.55.1
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
            - --web.enable-lifecycle
            # Thanos sidecar 需要的块时长设置（保持小块以便 sidecar 上传/暴露）。
            - --storage.tsdb.max-block-duration=2h
            - --storage.tsdb.min-block-duration=2h
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: rules
              mountPath: /etc/prometheus/rules
            - name: data
              mountPath: /prometheus
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
        # Thanos sidecar：把本区域 Prometheus 暴露为 Thanos Store API（gRPC 10901），
        # 供全局 Thanos Query 跨区域聚合查询（ADR-014）。
        - name: thanos-sidecar
          image: quay.io/thanos/thanos:v0.36.1
          args:
            - sidecar
            - --prometheus.url=http://localhost:9090
            - --tsdb.path=/prometheus
            - --grpc-address=0.0.0.0:10901
            - --http-address=0.0.0.0:10902
          ports:
            - name: grpc
              containerPort: 10901
            - name: http
              containerPort: 10902
          volumeMounts:
            - name: data
              mountPath: /prometheus
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 512Mi
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: rules
          configMap:
            name: alertmanager-rules
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  labels:
    app: prometheus
spec:
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090
---
# Thanos sidecar gRPC Store API, exposed so the global Thanos Query can reach
# this region's metrics (ADR-014). Cross-region traffic must be mTLS-protected
# (service mesh / Thanos gRPC TLS), see docs/architecture/multi-region-topology.md.
apiVersion: v1
kind: Service
metadata:
  name: thanos-store-gateway
  labels:
    app: prometheus
    thanos-store-api: "true"
spec:
  selector:
    app: prometheus
  ports:
    - name: grpc
      port: 10901
      targetPort: 10901
