apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: prometheus
  labels:
    app: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  serviceName: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          # infra-034: 此版本为 Prometheus 的唯一权威引用；docker-compose.yml 本地 dev
          # 环境必须与本行对齐（避免 dev/prod 版本漂移导致告警规则行为不一致）。
          image: prom/prometheus:v2.55.1
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
            - --web.enable-lifecycle
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: rules
              mountPath: /etc/prometheus/rules
            - name: prometheus-tsdb
              mountPath: /prometheus
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: rules
          configMap:
            name: alertmanager-rules
  volumeClaimTemplates:
    - metadata:
        name: prometheus-tsdb
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 100Gi
        # infra-030: storageClass 从 "ssd" 重命名为 "premium-rwo"——
        # "ssd" 是介质名而非 GKE 标准命名；GKE 默认 pd-ssd StorageClass 名为 "premium-rwo"。
        storageClassName: premium-rwo
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  labels:
    app: prometheus
spec:
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090