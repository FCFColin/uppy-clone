openapi: "3.0.3"
info:
  title: 多人网页气球飞行对战游戏 API
  description: 后端 REST API 与 WebSocket 接口文档。认证为 HttpOnly Cookie，错误响应遵循 RFC 7807 ProblemDetails。
  version: "1.0.0"
  contact: { name: Development Team }
servers:
  - { url: "http://localhost:8080", description: 本地开发环境 }
  - { url: "https://balloon-game.example.com", description: 生产环境 }
security: []
tags:
  - { name: Auth, description: 用户认证 }
  - { name: User, description: 用户数据管理（GDPR） }
  - { name: Registry, description: 房间创建与查询 }
  - { name: Admin, description: 管理员配置管理 }
  - { name: Stats, description: 排行榜与用户统计 }
  - { name: Health, description: 存活与就绪探针 }
  - { name: WebSocket, description: 游戏实时通信 }
paths:
  /api/v1/auth/quickplay:
    post:
      operationId: authQuickplay
      summary: 快速游戏（无需注册）
      description: 创建临时用户并返回 JWT Cookie + 刷新令牌；已携带 Cookie 则复用现有用户。
      tags: [Auth]
      requestBody: { required: false, content: { application/json: { schema: { type: object, properties: { nickname: { type: string, maxLength: 12 } } } } } }
      responses:
        "200": { description: 登录成功, headers: { Set-Cookie: { schema: { type: string } } }, content: { application/json: { schema: { $ref: "#/components/schemas/QuickPlayResponse" } } } }
        "500": { $ref: "#/components/responses/InternalServerError" }
  /api/v1/auth/request:
    post:
      operationId: authRequestMagicLink
      summary: 请求 Magic Link 登录邮件
      description: 向邮箱发送 Magic Link，限速 5 次/分钟，一次性使用。
      tags: [Auth]
      requestBody: { required: true, content: { application/json: { schema: { type: object, required: [email], properties: { email: { type: string, format: email } } } } } }
      responses:
        "200": { description: Magic Link 已发送, content: { application/json: { schema: { type: object, properties: { message: { type: string, example: "Magic link sent" } } } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "429": { $ref: "#/components/responses/TooManyRequests" }
        "500": { $ref: "#/components/responses/InternalServerError" }
  /api/v1/auth/verify:
    get:
      operationId: authVerifyMagicLink
      summary: 验证 Magic Link
      description: 验证 token，成功设置 session Cookie 并返回用户信息。token 一次性使用。
      tags: [Auth]
      parameters:
        - { name: token, in: query, required: true, schema: { type: string } }
      responses:
        "200": { description: 验证成功, headers: { Set-Cookie: { schema: { type: string } } }, content: { application/json: { schema: { $ref: "#/components/schemas/MagicLinkVerifyResponse" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      operationId: authVerifyMagicLinkPost
      summary: 验证 Magic Link（POST 变体）
      description: POST 变体，语义同 GET /verify，避免 token 出现在 URL。
      tags: [Auth]
      requestBody: { required: true, content: { application/json: { schema: { type: object, required: [token], properties: { token: { type: string } } } } } }
      responses:
        "200": { description: 验证成功, headers: { Set-Cookie: { schema: { type: string } } }, content: { application/json: { schema: { $ref: "#/components/schemas/MagicLinkVerifyResponse" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /api/v1/auth/check:
    get:
      operationId: authCheck
      summary: 检查当前认证状态
      tags: [Auth]
      security: [{ cookieAuth: [] }]
      responses:
        "200": { description: 已认证, content: { application/json: { schema: { type: object, properties: { authenticated: { type: boolean }, userId: { type: string } } } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /api/v1/auth/refresh:
    post:
      operationId: authRefreshToken
      summary: 刷新 access token
      description: 使用 refresh_token 换取新令牌，旧 token 立即失效。
      tags: [Auth]
      requestBody: { required: true, content: { application/json: { schema: { type: object, required: [refresh_token], properties: { refresh_token: { type: string } } } } } }
      responses:
        "200": { description: 刷新成功, headers: { Set-Cookie: { schema: { type: string } } }, content: { application/json: { schema: { type: object, properties: { access_token: { type: string }, refresh_token: { type: string } } } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "500": { $ref: "#/components/responses/InternalServerError" }
  /api/v1/auth/logout:
    post:
      operationId: authLogout
      summary: 登出
      description: 吊销 refresh token 并清除 Cookie。
      tags: [Auth]
      requestBody: { required: false, content: { application/json: { schema: { type: object, properties: { refresh_token: { type: string } } } } } }
      responses:
        "200": { description: 登出成功, headers: { Set-Cookie: { schema: { type: string } } }, content: { application/json: { schema: { type: object, properties: { message: { type: string, example: "Logged out" } } } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
  /api/v1/leaderboard:
    get:
      operationId: getLeaderboard
      summary: 公开排行榜
      description: scope=global|weekly，limit 默认 50。
      tags: [Stats]
      parameters:
        - { name: scope, in: query, schema: { type: string, enum: [global, weekly], default: global } }
        - { name: limit, in: query, schema: { type: integer, default: 50 } }
      responses:
        "200": { description: 排行榜条目, content: { application/json: { schema: { type: object, properties: { scope: { type: string }, entries: { type: array, items: { type: object } } } } } } }
        "400": { description: 无效 scope }
        "503": { description: 服务不可用 }
  /api/v1/user/stats:
    get:
      operationId: getUserStats
      summary: 当前用户最佳分与对局数
      tags: [Stats]
      security: [{ cookieAuth: [] }]
      responses:
        "200": { description: 用户统计, content: { application/json: { schema: { type: object, properties: { bestScore: { type: integer }, gamesPlayed: { type: integer } } } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /api/v1/user/data:
    get:
      operationId: userExportData
      summary: 导出用户数据（GDPR 数据可携带权）
      description: 导出当前用户全部个人数据（JSON）。需 user_data:read 权限。
      tags: [User]
      security: [{ cookieAuth: [] }]
      responses:
        "200": { description: 用户数据导出成功, content: { application/json: { schema: { type: object } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "500": { $ref: "#/components/responses/InternalServerError" }
    delete:
      operationId: userDeleteData
      summary: 删除用户数据（GDPR 被遗忘权）
      description: 软删除当前用户全部个人数据，异步处理。需 user_data:delete 权限。
      tags: [User]
      security: [{ cookieAuth: [] }]
      responses:
        "202": { description: 删除请求已接受，异步处理中, content: { application/json: { schema: { type: object, properties: { message: { type: string, example: "Deletion accepted" } } } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "500": { $ref: "#/components/responses/InternalServerError" }
  /api/v1/registry/create:
    post:
      operationId: registryCreateRoom
      summary: 创建房间
      description: 创建新游戏房间并返回 5 位房间代码。需认证，限速 5 次/分钟。
      tags: [Registry]
      security: [{ cookieAuth: [] }]
      responses:
        "200": { description: 房间创建成功, content: { application/json: { schema: { type: object, properties: { lobbyCode: { type: string, example: "ABC23" } } } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "409": { description: 房间代码冲突, content: { application/problem+json: { schema: { $ref: "#/components/schemas/ProblemDetails" } } } }
        "500": { $ref: "#/components/responses/InternalServerError" }
  /api/v1/registry/match:
    post:
      operationId: registryMatchRoom
      summary: 匹配房间
      description: 匹配可用房间并返回房间代码。需认证，限速 10 次/分钟。
      tags: [Registry]
      security: [{ cookieAuth: [] }]
      responses:
        "200": { description: 匹配成功, content: { application/json: { schema: { type: object, properties: { lobbyCode: { type: string, example: "ABC23" } } } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "503": { description: 暂无可用房间, content: { application/problem+json: { schema: { $ref: "#/components/schemas/ProblemDetails" } } } }
  /api/v1/registry/check/{code}:
    get:
      operationId: registryCheckRoom
      summary: 检查房间是否存在
      tags: [Registry]
      parameters:
        - { name: code, in: path, required: true, schema: { type: string, minLength: 5, maxLength: 5 } }
      responses:
        "200": { description: 房间存在, content: { application/json: { schema: { $ref: "#/components/schemas/RoomInfo" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/InternalServerError" }
  /api/v1/registry/lobbies:
    get:
      operationId: registryListLobbies
      summary: 列出活跃房间
      description: Cursor 分页查询活跃房间（limit 默认 50，最大 100）。
      tags: [Registry]
      parameters:
        - { name: limit, in: query, schema: { type: integer, minimum: 1, maximum: 100, default: 50 } }
        - { name: cursor, in: query, schema: { type: string } }
      responses:
        "200":
          description: 房间列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  lobbies: { type: array, items: { $ref: "#/components/schemas/LobbyState" } }
                  total: { type: integer }
                  has_more: { type: boolean }
                  next_cursor: { type: string }
        "500": { $ref: "#/components/responses/InternalServerError" }
  /api/v1/admin/login:
    post:
      operationId: adminLogin
      summary: 管理员登录
      description: 使用管理员密码登录，设置 admin_token Cookie（24h）。限速 10 次/5分钟。
      tags: [Admin]
      requestBody: { required: true, content: { application/json: { schema: { type: object, required: [password], properties: { password: { type: string, format: password } } } } } }
      responses:
        "200": { description: 登录成功, headers: { Set-Cookie: { schema: { type: string } } }, content: { application/json: { schema: { type: object, properties: { token: { type: string } } } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { description: 管理员未配置或密码未设置, content: { application/problem+json: { schema: { $ref: "#/components/schemas/ProblemDetails" } } } }
  /api/v1/admin/logout:
    post:
      operationId: adminLogout
      summary: 管理员登出
      description: 吊销当前 admin_token 并清除 Cookie。
      tags: [Admin]
      security: [{ adminAuth: [] }]
      responses:
        "200": { description: 登出成功, headers: { Set-Cookie: { schema: { type: string } } }, content: { application/json: { schema: { type: object, properties: { message: { type: string, example: "Logged out" } } } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /api/v1/admin/config:
    get:
      operationId: adminGetConfig
      summary: 获取配置
      description: 获取全局配置，敏感字段已脱敏。
      tags: [Admin]
      security: [{ adminAuth: [] }]
      responses:
        "200": { description: 配置信息, content: { application/json: { schema: { $ref: "#/components/schemas/AdminConfigResponse" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      operationId: adminUpdateConfig
      summary: 更新配置
      description: 部分更新全局配置。Resend API Key 用 AES-256-GCM 加密，密码用 bcrypt 哈希。
      tags: [Admin]
      security: [{ adminAuth: [] }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/AdminConfigUpdate" } } } }
      responses:
        "200": { description: 配置更新成功, content: { application/json: { schema: { type: object, properties: { message: { type: string, example: "Config updated" } } } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/InternalServerError" }
    put:
      operationId: adminUpdateConfigDeprecated
      summary: 更新配置（已弃用，请使用 PATCH）
      deprecated: true
      description: 已弃用，请用 PATCH。2027-01-01 后移除。
      tags: [Admin]
      security: [{ adminAuth: [] }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/AdminConfigUpdate" } } } }
      responses:
        "200":
          description: 配置更新成功
          headers:
            Deprecation: { schema: { type: string, example: "true" } }
            Sunset: { schema: { type: string, example: "Sat, 01 Jan 2027 00:00:00 GMT" } }
          content:
            application/json:
              schema: { type: object, properties: { message: { type: string, example: "Config updated" } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/InternalServerError" }
  /health/live:
    get:
      operationId: healthLive
      summary: 存活探针
      description: K8s 存活探针，返回 200 说明进程存活。
      tags: [Health]
      responses:
        "200": { description: 进程存活, content: { application/json: { schema: { type: object, properties: { status: { type: string, example: "alive" } } } } } }
  /health/ready:
    get:
      operationId: healthReady
      summary: 就绪探针
      description: 检查 PostgreSQL 和 Redis 连通性，任一不可用返回 503。
      tags: [Health]
      responses:
        "200": { description: 服务就绪, content: { application/json: { schema: { $ref: "#/components/schemas/ReadyResponse" } } } }
        "503": { description: 服务未就绪, content: { application/json: { schema: { $ref: "#/components/schemas/ReadyResponse" } } } }
  /health:
    get:
      operationId: healthAlias
      summary: 就绪探针（别名）
      description: /health/ready 别名，供不支持自定义路径的负载均衡器使用。
      tags: [Health]
      responses:
        "200": { description: 服务就绪, content: { application/json: { schema: { $ref: "#/components/schemas/ReadyResponse" } } } }
        "503": { description: 服务未就绪, content: { application/json: { schema: { $ref: "#/components/schemas/ReadyResponse" } } } }
  /health/degraded:
    get:
      operationId: healthDegraded
      summary: 降级状态查询
      description: 查询依赖熔断器状态，任一打开返回 503 + 降级依赖列表。
      tags: [Health]
      responses:
        "200": { description: 无依赖处于降级状态, content: { application/json: { schema: { type: object, properties: { degraded: { type: boolean, example: false }, dependencies: { type: array, items: { type: string } } } } } } }
        "503": { description: 至少一个依赖熔断器打开, content: { application/json: { schema: { type: object, properties: { degraded: { type: boolean, example: true }, dependencies: { type: array, items: { type: string }, example: ["postgres", "redis-stateful"] } } } } } }
  /metrics:
    get:
      operationId: metrics
      summary: Prometheus 指标端点
      description: 暴露 Prometheus 格式应用指标，受 metricsAuthMiddleware 保护。
      tags: [Health]
      responses:
        "200": { description: Prometheus 文本格式指标, content: { text/plain: { schema: { type: string } } } }
        "401": { description: 未认证 }
  /api/v1/lobby/{code}/ws:
    get:
      operationId: lobbyWebSocket
      summary: WebSocket 连接
      description: 升级为 WebSocket 参与游戏实时通信。需认证，Origin 必须匹配 Host（CSWSH 防护）。
      tags: [WebSocket]
      security: [{ cookieAuth: [] }]
      parameters:
        - { name: code, in: path, required: true, schema: { type: string } }
      responses:
        "101": { description: WebSocket 握手成功，协议升级 }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { description: Origin 不匹配（CSWSH 防护）, content: { application/problem+json: { schema: { $ref: "#/components/schemas/ProblemDetails" } } } }
        "404": { $ref: "#/components/responses/NotFound" }
components:
  securitySchemes:
    cookieAuth: { type: apiKey, in: cookie, name: quickplay, description: "用户 JWT access token Cookie（quickplay 或 session）" }
    adminAuth: { type: apiKey, in: cookie, name: admin_token, description: "管理员 JWT Cookie，24h，role=admin" }
  responses:
    BadRequest: { description: 请求无效, content: { application/problem+json: { schema: { $ref: "#/components/schemas/ProblemDetails" } } } }
    Unauthorized: { description: 未认证, content: { application/problem+json: { schema: { $ref: "#/components/schemas/ProblemDetails" } } } }
    NotFound: { description: 资源不存在, content: { application/problem+json: { schema: { $ref: "#/components/schemas/ProblemDetails" } } } }
    TooManyRequests: { description: 请求过于频繁, content: { application/problem+json: { schema: { $ref: "#/components/schemas/ProblemDetails" } } } }
    InternalServerError: { description: 内部服务器错误, content: { application/problem+json: { schema: { $ref: "#/components/schemas/ProblemDetails" } } } }
  schemas:
    ProblemDetails:
      type: object
      required: [type, title, status]
      properties: { type: { type: string, format: uri, example: "https://httpstatuses.com/400" }, title: { type: string, example: "Bad Request" }, status: { type: integer, example: 400 }, detail: { type: string, example: "Email is required" }, instance: { type: string } }
    QuickPlayResponse: { type: object, properties: { userId: { type: string, example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890" }, nickname: { type: string, example: "SkyRider" }, refreshToken: { type: string } } }
    MagicLinkVerifyResponse: { type: object, properties: { userId: { type: string, example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890" }, nickname: { type: string }, refreshToken: { type: string } } }
    RoomInfo: { type: object, properties: { code: { type: string, example: "ABC23" }, phase: { type: string, enum: [waiting, countdown, playing, ended], example: "waiting" }, playerCount: { type: integer, example: 2 }, createdAt: { type: integer, format: int64, description: "创建时间（Unix 毫秒）", example: 1719123456789 } } }
    LobbyState: { type: object, properties: { id: { type: string }, code: { type: string, example: "ABC23" }, state: { type: string }, updated_at: { type: integer, format: int64 }, created_at: { type: integer, format: int64 } } }
    AdminConfigResponse: { type: object, properties: { emailEnabled: { type: boolean, example: true }, resendApiKey: { type: string, example: "••••••••" }, emailFrom: { type: string, example: "noreply@example.com" } } }
    AdminConfigUpdate: { type: object, properties: { emailEnabled: { type: boolean }, resendApiKey: { type: string }, emailFrom: { type: string }, adminPassword: { type: string, format: password }, oldPassword: { type: string, format: password } } }
    ReadyResponse:
      type: object
      properties:
        status: { type: string, enum: [ready, "not ready"], example: "ready" }
        checks: { type: object, additionalProperties: { type: string, enum: [ok, unavailable] }, example: { postgres: "ok", redis: "ok" } }
