name: balloon-game
# Environment variables can be set in a .env file (see .env.example for reference).
services:
  migrate:
    build: .
    entrypoint: ["./server", "-migrate-only"]
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgres://uppy:uppy@postgres:5432/uppy?sslmode=disable}
    depends_on:
      postgres:
        condition: service_healthy
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      # Production: use app_user instead of uppy for least privilege
      # Also use sslmode=require (or verify-full) in production to enforce TLS.
      # DATABASE_URL=postgres://app_user:password@postgres:5432/uppy?sslmode=require
      - DATABASE_URL=${DATABASE_URL:-postgres://uppy:uppy@postgres:5432/uppy?sslmode=disable}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-dev-redis-secret}@redis:6379
      - REDIS_EPHEMERAL_URL=redis://:${REDIS_EPHEMERAL_PASSWORD:-dev-redis-secret}@redis-ephemeral:6379
      - JWT_PRIVATE_KEY=${JWT_PRIVATE_KEY:-}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - EMAIL_FROM=${EMAIL_FROM:-noreply@example.com}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:?ADMIN_PASSWORD required}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:5173}
      - ENABLE_HSTS=${ENABLE_HSTS:-false}
      - ENABLE_EMBEDDED_WORKERS=${ENABLE_EMBEDDED_WORKERS:-true}
      - FRONTEND_DIR=/app/dist
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:?ENCRYPTION_KEY required}
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      redis-ephemeral:
        condition: service_healthy
    # Development resource limits only. Production uses Kubernetes HPA for autoscaling.
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
  postgres:
    image: postgres:16.4-alpine3.20@sha256:5660c2cbfea50c7a9127d17dc4e48543eedd3d7a41a595a2dfa572471e37e64c
    environment:
      POSTGRES_USER: uppy
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-uppy}
      POSTGRES_DB: uppy
    ports:
      # Host port 5434 to avoid conflict with native postgresql-x64-16 on 5432.
      # Internal container port remains 5432; app connects via postgres:5432.
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U uppy"]
      interval: 5s
      timeout: 5s
      retries: 5
  redis:
    image: redis:7.4.0-alpine3.20@sha256:c35af3bbcef51a62c8bae5a9a563c6f1b60d7ebaea4cb5a3ccbcc157580ae098
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-dev-redis-secret}
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-dev-redis-secret}", "--save", "60", "1000", "--appendonly", "yes"]
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD-SHELL", "REDISCLI_AUTH=$$REDIS_PASSWORD redis-cli ping"]
      interval: 5s
      timeout: 5s
      retries: 5
  # Ephemeral Redis for rate limiting & idempotency cache (ADR-029).
  # No persistence needed — data loss is tolerable and fail-open is safe.
  redis-ephemeral:
    image: redis:7.4.0-alpine3.20@sha256:c35af3bbcef51a62c8bae5a9a563c6f1b60d7ebaea4cb5a3ccbcc157580ae098
    environment:
      - REDIS_EPHEMERAL_PASSWORD=${REDIS_EPHEMERAL_PASSWORD:-dev-redis-secret}
    command: ["redis-server", "--requirepass", "${REDIS_EPHEMERAL_PASSWORD:-dev-redis-secret}", "--maxmemory", "64mb", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - "127.0.0.1:6380:6379"
    healthcheck:
      test: ["CMD-SHELL", "REDISCLI_AUTH=$$REDIS_EPHEMERAL_PASSWORD redis-cli ping"]
      interval: 5s
      timeout: 5s
      retries: 5
  prometheus:
    # infra-034: 与 deploy/prometheus/deployment.yaml 对齐到 v2.55.1，避免本地 dev
    # 与生产 K8s 环境的 Prometheus 版本漂移（行为/指标 schema 差异会导致告警规则
    # 在 dev 验证通过却在 prod 失效）。摘要需通过 `docker pull prom/prometheus:v2.55.1`
    # 后用 `docker inspect --format='{{index .RepoDigests 0}}' prom/prometheus:v2.55.1` 重新固定。
    image: prom/prometheus:v2.55.1
    profiles: ["observability"]
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/local/prometheus.local.yml:/etc/prometheus/prometheus.yml:ro
      - ./deploy/prometheus/alerts.yml:/etc/prometheus/rules/rules.yml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
  alertmanager:
    image: prom/alertmanager:v0.27.0@sha256:e13b6ed5cb929eeaee733479dce55e10eb3bc2e9c4586c705a4e8da41e5eacf5
    profiles: ["observability"]
    ports:
      - "9093:9093"
    volumes:
      - ./deploy/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
  grafana:
    image: grafana/grafana:11.1.0@sha256:079600c9517b678c10cda6006b4487d3174512fd4c6cface37df7822756ed7a5
    profiles: ["observability"]
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
volumes:
  pgdata:
  redisdata:
