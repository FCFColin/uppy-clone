<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; img-src 'self' data:; connect-src 'self' ws: wss:; font-src 'self' https://fonts.gstatic.com data:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;"
    />
    <title data-i18n="play.title">Uppy - 合作气球游戏</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@300;400;500;600;700;800&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/style.css" />
    <link rel="stylesheet" href="/src/index.css" />
    <link rel="stylesheet" href="/src/styles/play.css" />
    <link rel="stylesheet" href="/src/leaderboard_page.css" />
  </head>
  <body class="game-page">
    <div id="bg-particles" class="bg-particles" aria-hidden="true"></div>
    <div class="hero-bg-overlay" aria-hidden="true"></div>
    <div id="countdown-overlay" class="game-overlay countdown-overlay hidden">
      <div class="countdown-content">
        <div class="countdown-label" data-i18n="play.countdown_ready">准备</div>
        <div class="countdown-number">3</div>
      </div>
    </div>

    <div id="loading-overlay" class="game-overlay hidden">
      <div class="overlay-card loading-card">
        <div class="loading-spinner"></div>
        <div class="loading-text" data-i18n="common.loading">加载中…</div>
        <div id="loading-error-panel" class="hidden">
          <div class="loading-error-inner">
            <div class="overlay-error-icon"></div>
            <h2 id="loading-error-title" data-i18n="error.room_not_exist">无法进入房间</h2>
            <p id="loading-error-text"></p>
            <div id="loading-error-actions" class="overlay-actions hidden">
              <button id="loading-back-btn" class="btn-overlay-secondary" type="button" data-i18n="common.back_lobby">
                返回大厅
              </button>
              <button id="loading-match-btn" class="btn-overlay-primary" type="button" data-i18n="play.match_new_room">
                匹配新房间
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="reconnect-banner" class="game-overlay reconnect-overlay hidden">
      <div class="overlay-card reconnect-card">
        <div class="reconnect-spinner"></div>
        <div id="reconnect-text" data-i18n="play.reconnect_text">网络断开，正在重连…</div>
        <p class="reconnect-pause-hint" data-i18n="play.reconnect_hint">对局已暂停，重连后同步</p>
        <button id="reconnect-retry-btn" class="btn-overlay-secondary" type="button" data-i18n="common.retry">
          立即重试
        </button>
      </div>
    </div>

    <div id="tutorial-overlay" class="game-overlay hidden">
      <div class="overlay-card tutorial-card">
        <div class="tutorial-step-indicator">
          <span class="tutorial-step">1 / 3</span>
        </div>
        <p class="tutorial-text"></p>
        <div class="tutorial-actions overlay-actions">
          <button id="tutorial-skip-btn" class="btn-overlay-secondary" type="button" data-i18n="play.skip_tutorial">
            跳过教程
          </button>
          <button id="tutorial-next-btn" class="btn-overlay-primary" type="button" data-i18n="play.next_step">
            下一步
          </button>
        </div>
      </div>
    </div>

    <div id="nickname-setup-screen" class="game-overlay hidden">
      <div class="overlay-card nickname-card">
        <div class="nickname-card-header">
          <div class="nickname-card-icon" aria-hidden="true">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="48"
              height="48"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <ellipse cx="12" cy="9" rx="7" ry="9" />
              <path d="M12 18v3" />
              <path d="M9 22h6" />
            </svg>
          </div>
          <h2 class="nickname-card-title" data-i18n="play.join_game">加入游戏</h2>
          <p class="nickname-card-subtitle" data-i18n="play.nickname_hint">输入昵称开始气球冒险</p>
        </div>
        <form id="nickname-entry-form">
          <div class="nickname-input-group">
            <span class="nickname-input-icon" aria-hidden="true">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                <circle cx="12" cy="7" r="4" />
              </svg>
            </span>
            <input
              id="setup-nickname-input"
              type="text"
              maxlength="12"
              placeholder="输入昵称（2-12字）"
              aria-label="昵称"
              autocomplete="off"
              data-i18n-placeholder="play.nickname_placeholder"
              data-i18n-aria="play.nickname_label"
            />
            <div class="nickname-input-suffix">
              <span id="nickname-valid-check" class="nickname-valid-check hidden" aria-hidden="true">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="20"
                  height="20"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="3"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <polyline points="20 6 9 17 4 12" />
                </svg>
              </span>
              <button
                id="random-nickname-btn"
                class="btn-nickname-random"
                type="button"
                data-i18n-title="play.random"
                data-i18n-aria="play.random"
                title="随机昵称"
                aria-label="随机昵称"
              >
                <svg
                  class="btn-random-icon"
                  xmlns="http://www.w3.org/2000/svg"
                  width="16"
                  height="16"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  aria-hidden="true"
                >
                  <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
                  <circle cx="8" cy="8" r="1.5" />
                  <circle cx="16" cy="8" r="1.5" />
                  <circle cx="8" cy="16" r="1.5" />
                  <circle cx="16" cy="16" r="1.5" />
                  <circle cx="12" cy="12" r="1.5" />
                </svg>
              </button>
            </div>
          </div>
          <div id="nickname-status-row" class="nickname-status-row">
            <span class="nickname-status-dot" aria-hidden="true"></span>
            <span id="nickname-connect-status" class="nickname-status-text">正在连接房间…</span>
          </div>
          <button id="enter-game-btn" class="btn-enter-game" type="submit">
            <span class="btn-enter-icon" aria-hidden="true">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="22"
                height="22"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z" />
                <path
                  d="m12 15-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z"
                />
                <path d="M9 12H4s.55-3.03 2-4c1.62-1.08 5 0 5 0" />
                <path d="M12 15v5s3.03-.55 4-2c1.08-1.62 0-5 0-5" />
              </svg>
            </span>
            <span class="btn-enter-text" data-i18n="play.enter_game">进入游戏</span>
          </button>
          <p class="nickname-enter-hint" data-i18n-html="play.enter_hint">按下 <kbd>Enter</kbd> 键快速加入</p>
        </form>
        <div class="nickname-features">
          <span class="feature-item" data-i18n="play.secure"
            ><span class="feature-icon" aria-hidden="true"
              ><svg
                xmlns="http://www.w3.org/2000/svg"
                width="14"
                height="14"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <rect x="5" y="11" width="14" height="10" rx="2" ry="2" />
                <path d="M7 11V7a5 5 0 0 1 10 0v4" /></svg
            ></span>
            安全连接</span
          >
          <span class="feature-item" data-i18n="play.fast_match"
            ><span class="feature-icon" aria-hidden="true"
              ><svg
                xmlns="http://www.w3.org/2000/svg"
                width="14"
                height="14"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" /></svg
            ></span>
            快速匹配</span
          >
          <span class="feature-item" data-i18n="play.multiplayer"
            ><span class="feature-icon" aria-hidden="true"
              ><svg
                xmlns="http://www.w3.org/2000/svg"
                width="14"
                height="14"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
                <circle cx="9" cy="7" r="4" />
                <path d="M22 21v-2a4 4 0 0 0-3-3.87" />
                <path d="M16 3.13a4 4 0 0 1 0 7.75" /></svg
            ></span>
            多人联机</span
          >
        </div>
      </div>
    </div>

    <div id="waiting-screen" class="game-overlay hidden">
      <div class="overlay-card waiting-card">
        <div class="waiting-spinner" aria-hidden="true"></div>
        <h2 id="waiting-title" data-i18n="play.waiting_title">准备开始...</h2>
        <p id="waiting-connect-error" class="overlay-error entry-inline-error hidden"></p>
        <div class="room-code-display">
          <span class="room-code-label" data-i18n="play.room_code">房间码</span>
          <span id="lobby-code" class="room-code">-----</span>
          <button id="copy-code-btn" class="btn-icon-small" type="button" title="复制邀请链接">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <rect width="14" height="14" x="8" y="8" rx="2" ry="2" />
              <path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2" />
            </svg>
          </button>
        </div>
        <div id="player-list-waiting" class="player-list overlay-player-list"></div>
        <div class="waiting-status-row">
          <span class="waiting-status-dot" aria-hidden="true"></span>
          <span id="waiting-tips-summary" class="waiting-status-text">当前 1 人 · 冷却约 1.0 秒</span>
        </div>
        <button
          id="waiting-tips-toggle"
          class="btn-overlay-secondary waiting-tips-toggle"
          type="button"
          aria-expanded="false"
          data-i18n="play.tips"
        >
          玩法提示
        </button>
        <div id="waiting-tips-body" class="waiting-tips-body hidden">
          <ul class="tips-list">
            <li data-i18n="play.tip1">在气球附近点击把它往上推</li>
            <li data-i18n="play.tip2">鸟和幽灵碰到气球会结束游戏</li>
            <li data-i18n="play.tip3">靠近幽灵点击可将其推开</li>
            <li data-i18n="play.tip4">留意 HUD 风向指示</li>
          </ul>
        </div>
        <p class="overlay-hint" data-i18n="play.solo_hint">支持单人游玩；也可分享房间码邀请朋友！</p>
      </div>
    </div>

    <div id="ended-screen" class="game-overlay hidden">
      <div class="overlay-card ended-card">
        <div class="ended-trophy-icon"></div>
        <h2 class="ended-title" data-i18n="play.game_over">游戏结束</h2>
        <p id="end-reason" class="end-reason"></p>
        <div class="final-score-wrap">
          <span class="final-score-label" data-i18n="play.final_score">最终得分</span>
          <div id="final-score" class="big-score final-score">0</div>
        </div>
        <p id="personal-best" class="overlay-hint personal-best-hint"></p>
        <div id="end-player-list" class="player-list overlay-player-list end-player-list"></div>
        <div class="overlay-actions ended-actions">
          <button id="restart-btn" class="btn-overlay-primary btn-full" type="button">
            <span class="btn-icon restart-btn-icon"></span>
            <span data-i18n="play.restart">重新开始</span>
          </button>
          <a href="/" class="btn-overlay-secondary btn-full end-home-link" id="end-home-btn">
            <span class="btn-icon home-btn-icon"></span>
            <span data-i18n="common.back_lobby">返回大厅</span>
          </a>
        </div>
        <div id="restart-progress" class="restart-progress"></div>
        <div id="restart-countdown" class="restart-countdown"></div>
      </div>
    </div>

    <main id="main-content">
      <div id="game-hud" class="game-hud hidden">
        <div class="hud-top-bar">
          <div class="hud-group hud-left-group">
            <button
              id="hud-menu-btn"
              class="btn-hud-card btn-hud-menu"
              type="button"
              title="菜单"
              aria-label="菜单"
              data-i18n-title="common.menu"
              data-i18n-aria="common.menu"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="18"
                height="18"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                aria-hidden="true"
              >
                <line x1="4" x2="20" y1="12" y2="12" />
                <line x1="4" x2="20" y1="6" y2="6" />
                <line x1="4" x2="20" y1="18" y2="18" />
              </svg>
            </button>
          </div>
          <div class="hud-group hud-center-group">
            <div class="hud-card hud-room-card">
              <span class="hud-card-icon hud-icon-key" aria-hidden="true"></span>
              <span id="hud-code" class="hud-room-code hidden">-----</span>
            </div>
            <div class="hud-card hud-players-card">
              <span class="hud-card-icon hud-icon-users" aria-hidden="true"></span>
              <span id="hud-players" class="hud-card-value hud-players-value">0</span>
            </div>
            <div id="wind-indicator" class="hud-card hud-wind-card">
              <div class="wind-header">
                <span id="wind-direction" class="wind-direction" aria-hidden="true">→</span>
                <span class="wind-label" data-i18n="play.wind_label">风力</span>
                <span id="wind-strength" class="wind-strength">0%</span>
              </div>
              <div class="wind-meter-wrap">
                <div class="wind-meter-track">
                  <div id="wind-meter-fill" class="wind-meter-fill"></div>
                  <div class="wind-meter-center"></div>
                  <span id="wind-percent" class="wind-percent">0%</span>
                </div>
              </div>
              <span id="wind-first-hint" class="wind-first-hint hidden" data-i18n="play.wind_hint"
                >风会影响气球漂移</span
              >
            </div>
            <div class="hud-card hud-score-card">
              <span class="hud-card-icon hud-icon-score" aria-hidden="true"></span>
              <span id="hud-score" class="hud-card-value hud-score-value">0</span>
            </div>
            <div class="hud-card hud-timer-card">
              <span class="hud-card-icon hud-icon-timer" aria-hidden="true"></span>
              <span id="hud-timer" class="hud-card-value hud-timer-value">00:00</span>
            </div>
          </div>
          <div class="hud-group hud-right-group">
            <div class="hud-actions">
              <button
                id="hud-copy-btn"
                class="btn-hud-card"
                type="button"
                title="复制房间码"
                aria-label="复制房间码"
                data-i18n-title="play.copy_code"
                data-i18n-aria="play.copy_code"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="18"
                  height="18"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  aria-hidden="true"
                >
                  <rect width="14" height="14" x="8" y="8" rx="2" ry="2" />
                  <path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2" />
                </svg>
              </button>
              <button
                id="mute-toggle"
                class="btn-hud-card"
                aria-label="切换静音"
                title="切换静音"
                type="button"
                data-i18n-title="play.mute"
                data-i18n-aria="play.mute"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="18"
                  height="18"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  aria-hidden="true"
                >
                  <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" />
                  <path d="M15.54 8.46a5 5 0 0 1 0 7.07" />
                  <path d="M19.07 4.93a10 10 0 0 1 0 14.14" />
                </svg>
              </button>
              <button
                id="view-leaderboard-btn"
                class="btn-hud-card"
                type="button"
                title="查看排行榜"
                aria-label="查看排行榜"
                data-i18n-title="play.view_leaderboard"
                data-i18n-aria="play.view_leaderboard"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="18"
                  height="18"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  aria-hidden="true"
                >
                  <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6" />
                  <path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18" />
                  <path d="M4 22h16" />
                  <path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22" />
                  <path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22" />
                  <path d="M18 2H6v7a6 6 0 0 0 12 0V2Z" />
                </svg>
              </button>
              <button
                id="leave-game-btn"
                class="btn-hud-card btn-hud-leave"
                aria-label="返回大厅"
                title="返回大厅"
                type="button"
                data-i18n-title="common.back_lobby"
                data-i18n-aria="common.back_lobby"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="18"
                  height="18"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  aria-hidden="true"
                >
                  <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                  <polyline points="16 17 21 12 16 7" />
                  <line x1="21" x2="9" y1="12" y2="12" />
                </svg>
              </button>
            </div>
          </div>
        </div>
        <div class="hud-bottom-bar">
          <div id="hud-player-list" class="hud-player-list"></div>
        </div>
      </div>

      <div id="cooldown-indicator" class="cooldown-indicator hidden">
        <span class="cooldown-icon" aria-hidden="true">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" />
          </svg>
        </span>
        <div class="cooldown-track">
          <div id="cooldown-bar" class="cooldown-bar"></div>
        </div>
        <div id="cooldown-text" class="cooldown-text" data-i18n="play.ready">就绪</div>
      </div>

      <canvas id="game-canvas"></canvas>
    </main>

    <div id="leaderboard-overlay" class="lb-overlay" hidden>
      <div class="lb-overlay-backdrop" data-action="close-leaderboard"></div>
      <div
        class="lb-overlay-dialog"
        role="dialog"
        aria-modal="true"
        aria-label="排行榜"
        data-i18n-aria="common.leaderboard"
      >
        <div class="lb-overlay-header">
          <h2 data-i18n="common.leaderboard">排行榜</h2>
          <button
            type="button"
            class="lb-overlay-close"
            data-action="close-leaderboard"
            aria-label="关闭"
            data-i18n-aria="common.close"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <line x1="18" x2="6" y1="6" y2="18" />
              <line x1="6" x2="18" y1="6" y2="18" />
