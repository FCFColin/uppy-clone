<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Uppy - 合作气球游戏</title>
  <link rel="stylesheet" href="/src/style.css">
  <link rel="stylesheet" href="/src/styles/play.css">
</head>
<body class="game-page">
  <div id="countdown-overlay" class="hidden">
    <div class="countdown-number">3</div>
  </div>

  <div id="loading-overlay">
    <div class="loading-spinner"></div>
    <div class="loading-text">加载中…</div>
    <div id="loading-error-panel" class="hidden">
      <div class="overlay-content loading-error-card">
        <h2 id="loading-error-title">无法进入房间</h2>
        <p id="loading-error-text"></p>
        <div id="loading-error-actions" class="loading-error-actions hidden">
          <button id="loading-back-btn" class="btn-primary" type="button">返回大厅</button>
          <button id="loading-match-btn" class="btn-small" type="button">匹配新房间</button>
        </div>
      </div>
    </div>
  </div>

  <div id="reconnect-banner" class="reconnect-banner hidden">
    <div class="reconnect-content">
      <div class="reconnect-spinner"></div>
      <div id="reconnect-text">网络断开，正在重连…</div>
    </div>
  </div>

  <div id="rotate-hint" class="rotate-hint hidden">
    <div class="rotate-hint-content">
      <div class="rotate-icon">📱↔️</div>
      <p>请旋转手机至横屏模式</p>
    </div>
  </div>

  <div id="nickname-setup-screen" class="overlay hidden">
    <div class="overlay-content">
      <h2>设置你的昵称</h2>
      <div class="nickname-setup">
        <input id="setup-nickname-input" type="text" maxlength="12" placeholder="输入昵称...">
        <button id="random-nickname-btn" class="btn-small">随机一个</button>
      </div>
      <button id="enter-game-btn" class="btn-primary">进入游戏</button>
    </div>
  </div>

  <div id="waiting-screen" class="overlay hidden">
    <div class="overlay-content">
      <h2 id="waiting-title">准备开始...</h2>
      <div class="lobby-code-display">
        <span>房间码:</span>
        <span id="lobby-code" class="code">-----</span>
        <button id="copy-code-btn" class="btn-small">复制</button>
      </div>
      <div id="player-list-waiting" class="player-list"></div>
      <p class="hint">支持单人游玩；也可分享房间码邀请朋友！</p>
    </div>
  </div>

  <div id="nickname-inline" class="nickname-inline hidden">
    <input id="nickname-input" type="text" maxlength="12" placeholder="昵称...">
    <button id="nickname-btn" class="btn-small">OK</button>
  </div>

  <div id="ended-screen" class="overlay hidden">
    <div class="overlay-content">
      <h2>游戏结束！</h2>
      <div id="final-score" class="big-score">0</div>
      <div id="end-player-list" class="player-list"></div>
      <button id="restart-btn" class="btn-primary">重新开始</button>
      <div id="restart-progress" class="restart-progress"></div>
      <div id="restart-countdown" class="restart-countdown"></div>
    </div>
  </div>

  <div id="game-hud" class="hud hidden">
    <div class="hud-top">
      <div class="hud-left">
        <span class="hud-label">房间</span>
        <span id="hud-code" class="hud-value">-----</span>
        <button id="hud-copy-btn" class="btn-icon" title="复制房间码">📋</button>
      </div>
      <div class="hud-center">
        <span id="hud-score" class="hud-score">0</span>
      </div>
      <div class="hud-right">
        <span class="hud-label">玩家</span>
        <span id="hud-players" class="hud-value">0</span>
        <div id="wind-indicator" class="wind-indicator hidden">
          <span class="hud-label">风</span>
          <span id="wind-direction" class="wind-direction" aria-hidden="true">→</span>
          <div class="wind-meter" aria-hidden="true">
            <div class="wind-meter-track">
              <div id="wind-meter-fill" class="wind-meter-fill"></div>
              <div class="wind-meter-center"></div>
            </div>
          </div>
          <span id="wind-strength" class="wind-strength">0%</span>
        </div>
        <span id="ping-display" class="ping-display"></span>
      </div>
    </div>
    <div class="hud-bottom">
      <div id="hud-player-list" class="hud-player-list"></div>
    </div>
  </div>

  <div id="cooldown-indicator" class="cooldown-indicator hidden">
    <div class="cooldown-track">
      <div id="cooldown-bar" class="cooldown-bar"></div>
    </div>
    <div id="cooldown-text" class="cooldown-text">Ready!</div>
  </div>

  <canvas id="game-canvas"></canvas>

  <script type="module" src="/src/game/main.ts"></script>
</body>
</html>
