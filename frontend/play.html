<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Uppy - 合作气球游戏</title>
  <link rel="stylesheet" href="/src/style.css">
  <link rel="stylesheet" href="/src/styles/play.css">
</head>
<body class="game-page">
  <div id="countdown-overlay" class="hidden">
    <div class="countdown-label">准备</div>
    <div class="countdown-number">3</div>
  </div>

  <div id="loading-overlay">
    <div class="loading-spinner"></div>
    <div class="loading-text">加载中…</div>
    <div id="loading-error-panel" class="hidden">
      <div class="overlay-content loading-error-card">
        <h2 id="loading-error-title">无法进入房间</h2>
        <p id="loading-error-text"></p>
        <div id="loading-error-actions" class="loading-error-actions hidden">
          <button id="loading-back-btn" class="btn-primary" type="button">返回大厅</button>
          <button id="loading-match-btn" class="btn-small" type="button">匹配新房间</button>
        </div>
      </div>
    </div>
  </div>

  <div id="reconnect-banner" class="reconnect-banner hidden">
    <div class="reconnect-content">
      <div class="reconnect-spinner"></div>
      <div id="reconnect-text">网络断开，正在重连…</div>
      <p class="reconnect-pause-hint">对局已暂停，重连后同步</p>
      <button id="reconnect-retry-btn" class="btn-small" type="button">立即重试</button>
    </div>
  </div>

  <div id="tutorial-overlay" class="overlay hidden">
    <div class="overlay-content tutorial-card">
      <p class="tutorial-step">1 / 3</p>
      <p class="tutorial-text"></p>
      <div class="tutorial-actions">
        <button id="tutorial-skip-btn" class="btn-small" type="button">跳过教程</button>
        <button id="tutorial-next-btn" class="btn-primary" type="button">下一步</button>
      </div>
    </div>
  </div>

  <div id="nickname-setup-screen" class="overlay hidden">
    <div class="overlay-content">
      <h2>设置你的昵称</h2>
      <div class="nickname-setup">
        <input id="setup-nickname-input" type="text" maxlength="12" placeholder="输入昵称..." aria-label="昵称">
        <button id="random-nickname-btn" class="btn-small" type="button">随机一个</button>
      </div>
      <button id="enter-game-btn" class="btn-primary" type="button">进入游戏</button>
      <p id="nickname-connect-status" class="hint">正在连接房间…</p>
    </div>
  </div>

  <div id="waiting-screen" class="overlay hidden">
    <div class="overlay-content waiting-card">
      <h2 id="waiting-title">准备开始...</h2>
      <div class="lobby-code-display">
        <span>房间码:</span>
        <span id="lobby-code" class="code">-----</span>
        <button id="copy-code-btn" class="btn-small" type="button">复制</button>
      </div>
      <div id="player-list-waiting" class="player-list"></div>
      <p id="waiting-tips-summary" class="hint">当前 1 人 · 冷却约 1.0 秒</p>
      <button id="waiting-tips-toggle" class="btn-small waiting-tips-toggle" type="button" aria-expanded="false">玩法提示 ▾</button>
      <div id="waiting-tips-body" class="waiting-tips-body hidden">
        <ul class="tips-list">
          <li>在气球附近点击把它往上推</li>
          <li>鸟和幽灵碰到气球会结束游戏</li>
          <li>靠近幽灵点击可将其推开</li>
          <li>留意 HUD 风向指示</li>
        </ul>
      </div>
      <p class="hint">支持单人游玩；也可分享房间码邀请朋友！</p>
    </div>
  </div>

  <div id="ended-screen" class="overlay hidden">
    <div class="overlay-content">
      <h2>游戏结束！</h2>
      <p id="end-reason" class="end-reason"></p>
      <div id="final-score" class="big-score">0</div>
      <p id="personal-best" class="hint"></p>
      <div id="end-player-list" class="player-list"></div>
      <button id="restart-btn" class="btn-primary" type="button">投票重新开始（需全员同意）</button>
      <div id="restart-progress" class="restart-progress"></div>
      <div id="restart-countdown" class="restart-countdown"></div>
      <a href="/leaderboard.html" class="link-secondary end-leaderboard-link">查看排行榜 →</a>
    </div>
  </div>

  <div id="game-hud" class="hud hidden">
    <div class="hud-top">
      <div class="hud-row hud-row-score">
        <span id="hud-score" class="hud-score">0</span>
      </div>
      <div class="hud-row hud-row-meta">
        <div class="hud-left">
          <span class="hud-label">房间</span>
          <span id="hud-code" class="hud-value">-----</span>
          <button id="hud-copy-btn" class="btn-icon" type="button" title="复制房间码" aria-label="复制房间码">📋</button>
        </div>
        <div class="hud-right">
          <span class="hud-label">玩家</span>
          <span id="hud-players" class="hud-value">0</span>
          <div id="wind-indicator" class="wind-indicator hidden">
            <span class="hud-label">风</span>
            <span id="wind-direction" class="wind-direction" aria-hidden="true">→</span>
            <div class="wind-meter" aria-hidden="true">
              <div class="wind-meter-track">
                <div id="wind-meter-fill" class="wind-meter-fill"></div>
                <div class="wind-meter-center"></div>
              </div>
            </div>
            <span id="wind-strength" class="wind-strength">0%</span>
            <span id="wind-first-hint" class="wind-first-hint hidden">风会影响气球漂移</span>
          </div>
          <span id="ping-display" class="ping-display hidden"></span>
        </div>
      </div>
    </div>
    <div class="hud-bottom">
      <div id="hud-player-list" class="hud-player-list"></div>
    </div>
  </div>

  <div id="cooldown-indicator" class="cooldown-indicator hidden">
    <div class="cooldown-track">
      <div id="cooldown-bar" class="cooldown-bar"></div>
    </div>
    <div id="cooldown-text" class="cooldown-text">就绪</div>
  </div>

  <canvas id="game-canvas"></canvas>

  <script type="module" src="/src/game/main.ts"></script>
</body>
</html>
