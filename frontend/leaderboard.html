<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' wss: ws:">
  <title>Uppy - 合作气球游戏</title>
  <meta name="description" content="Uppy 合作气球游戏排行榜 — 团队最高分排行。">
  <link rel="stylesheet" href="/src/style.css">
  <link rel="stylesheet" href="/src/index.css">
</head>
<body class="landing-page">
  <div class="hero leaderboard-page">
    <h1>🏆 排行榜</h1>
    <p class="subtitle">团队最高分</p>
    <div class="leaderboard-tabs">
      <button id="tab-global" class="btn-secondary active" type="button">总榜</button>
      <button id="tab-weekly" class="btn-secondary" type="button">周榜</button>
    </div>
    <ol id="leaderboard-list" class="leaderboard-list"></ol>
    <p id="leaderboard-empty" class="hint hidden">暂无记录，快去开一局吧！</p>
    <a href="/" class="btn-secondary lb-nav-btn">返回大厅</a>
    <button id="back-to-game-btn" class="btn-secondary lb-nav-btn" type="button" hidden>返回游戏</button>
  </div>
  <script type="module" src="/src/leaderboard.ts"></script>
</body>
</html>
