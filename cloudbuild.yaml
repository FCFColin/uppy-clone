steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/uppy-clone:$COMMIT_SHA', '.']

  # Push the container image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/uppy-clone:$COMMIT_SHA']

  # Deploy container image to Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'uppy-clone'
      - '--image=gcr.io/$PROJECT_ID/uppy-clone:$COMMIT_SHA'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--set-env-vars=JWT_SECRET=$$JWT_SECRET,DATABASE_URL=$$DATABASE_URL,REDIS_URL=$$REDIS_URL,RESEND_API_KEY=$$RESEND_API_KEY,ADMIN_PASSWORD=$$ADMIN_PASSWORD,FRONTEND_DIR=/app/dist'
    secretEnv: ['JWT_SECRET', 'DATABASE_URL', 'REDIS_URL', 'RESEND_API_KEY', 'ADMIN_PASSWORD']

substitutions:
  _REGION: us-central1

images:
  - 'gcr.io/$PROJECT_ID/uppy-clone:$COMMIT_SHA'

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/jwt-secret/versions/latest
      env: 'JWT_SECRET'
    - versionName: projects/$PROJECT_ID/secrets/database-url/versions/latest
      env: 'DATABASE_URL'
    - versionName: projects/$PROJECT_ID/secrets/redis-url/versions/latest
      env: 'REDIS_URL'
    - versionName: projects/$PROJECT_ID/secrets/resend-api-key/versions/latest
      env: 'RESEND_API_KEY'
    - versionName: projects/$PROJECT_ID/secrets/admin-password/versions/latest
      env: 'ADMIN_PASSWORD'
